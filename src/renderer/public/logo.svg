<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#2a1e0e"/>
    </linearGradient>
    <linearGradient id="main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb830"/>
      <stop offset="100%" stop-color="#e8850c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Agent head -->
  <rect x="148" y="180" width="216" height="200" rx="48" ry="48" fill="url(#main)"/>

  <!-- Two eyes -->
  <circle cx="212" cy="280" r="24" fill="#1a1208"/>
  <circle cx="300" cy="280" r="24" fill="#1a1208"/>

  <!-- Antenna stem -->
  <line x1="256" y1="180" x2="256" y2="120" stroke="url(#main)" stroke-width="16" stroke-linecap="round"/>

  <!-- Antenna dot -->
  <circle cx="256" cy="108" r="20" fill="url(#main)"/>
</svg>

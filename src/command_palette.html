<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command Palette</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --placeholder: #b0b0b0;
      --accent: #1a6fb5;
      --accent-text: #ffffff;
      --item-hover: rgba(0, 0, 0, 0.05);
      --kbd-bg: rgba(0, 0, 0, 0.06);
      --kbd-border: rgba(0, 0, 0, 0.1);
      --error: #e55;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #2d2d2d;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #666666;
        --placeholder: #555555;
        --accent: #2b7ab5;
        --accent-text: #ffffff;
        --item-hover: rgba(255, 255, 255, 0.04);
        --kbd-bg: rgba(255, 255, 255, 0.06);
        --kbd-border: rgba(255, 255, 255, 0.08);
        --error: #e55;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    body { padding: 40px; }

    .palette {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--surface);
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: none;
      align-items: center;
      padding: 0 12px;
      background: var(--bg);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .breadcrumb.visible { display: flex; }
    .bc-back {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); cursor: pointer;
      border: none; background: none;
      margin-right: 6px; padding: 0;
      transition: background 0.1s, color 0.1s;
    }
    .bc-back:hover { background: var(--item-hover); color: var(--text); }
    .bc-back svg { width: 14px; height: 14px; }
    .bc-segment { padding: 8px 0; color: var(--muted); }
    .bc-segment.current { color: var(--text-strong); font-weight: 500; }
    .bc-sep { color: var(--muted); padding: 0 6px; font-size: 10px; opacity: 0.5; }

    /* ── Search ── */
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .search-icon {
      width: 14px; height: 14px;
      color: var(--muted); flex-shrink: 0; opacity: 0.7;
    }
    .search {
      flex: 1; border: 0; background: none;
      color: var(--text-strong);
      font-size: 13px; outline: none;
      font-family: inherit;
    }
    .search::placeholder { color: var(--placeholder); }

    /* ── Results ── */
    .results {
      flex: 1; overflow: auto; padding: 2px;
      border-top: 1px solid var(--border);
    }
    /* When settings/custom form uses results, switch to flex column layout */
    .results:has(.set-list),
    .results:has(.set-footer) {
      display: flex; flex-direction: column;
      overflow: hidden; padding: 0;
    }
    .results::-webkit-scrollbar { width: 3px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.15); border-radius: 3px; }

    .sep { height: 1px; background: var(--border); margin: 2px 10px; }

    /* ── Items ── */
    .item {
      border: 0; width: 100%; text-align: left;
      background: transparent; color: var(--text);
      padding: 6px 12px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      font-family: inherit; font-size: 13px;
      transition: background 0.06s;
    }
    .item.has-desc { padding: 7px 12px; }
    .item:hover { background: var(--item-hover); }
    .item.active { background: var(--accent); color: var(--accent-text); }
    .item.active .item-subtitle { color: rgba(255, 255, 255, 0.55); }
    .item.active .item-shortcut {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .item.active .item-type { color: rgba(255, 255, 255, 0.5); }
    .item.active .item-chevron { color: rgba(255, 255, 255, 0.4); }
    .item.active .setting-value {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .item.active .item-check { color: rgba(255, 255, 255, 0.7); }

    .item-content { flex: 1; min-width: 0; }
    .item-title {
      font-size: 13px; font-weight: 400; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-subtitle {
      font-size: 11px; color: var(--muted); line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }
    .item-type {
      font-size: 11px; color: var(--muted); flex-shrink: 0; font-style: italic;
    }
    .item-shortcut {
      flex-shrink: 0; font-size: 10px; color: var(--muted);
      background: var(--kbd-bg); border: 1px solid var(--kbd-border);
      border-radius: 3px; padding: 1px 4px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      line-height: 1.4;
    }
    .item-chevron {
      flex-shrink: 0; font-size: 14px; line-height: 1;
      color: var(--muted); font-weight: 300;
    }
    .item-check {
      flex-shrink: 0; font-size: 14px; line-height: 1;
      color: var(--accent);
    }
    .setting-value {
      flex-shrink: 0; font-size: 11px; color: var(--muted);
      background: var(--kbd-bg); border: 1px solid var(--kbd-border);
      border-radius: 3px; padding: 1px 6px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      line-height: 1.4; max-width: 140px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .setting-source {
      font-size: 10px; opacity: 0.7; font-style: italic;
      font-family: inherit;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); padding: 10px 12px 4px;
    }

    /* ── Settings: dense list ── */
    .set-list { --set-group-h: 28px; }
    .set-toolbar {
      display: flex; justify-content: flex-end; gap: 4px;
      padding: 4px 10px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .set-toolbar-btn {
      font-family: inherit;
      font-size: 10px; color: var(--muted);
      background: none; border: none;
      padding: 2px 6px; border-radius: 3px;
      cursor: pointer;
      transition: background 0.08s, color 0.08s;
    }
    .set-toolbar-btn:hover {
      background: var(--bg); color: var(--text);
    }

    .set-list {
      flex: 1; overflow-y: auto;
      padding: 0 0 6px;
      background: var(--surface);
    }
    .set-list::-webkit-scrollbar { width: 3px; }
    .set-list::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.15); border-radius: 3px; }

    /* Group headers — sticky and opaque so scrolling content cannot bleed through. */
    .set-group-header {
      position: sticky;
      display: flex; align-items: center; gap: 8px;
      width: 100%;
      background: var(--surface);
      border: none;
      text-align: left; cursor: pointer;
      font-family: inherit;
      transition: background 0.06s;
    }
    .set-group-header:hover { background: var(--bg); }
    .set-group-header.depth-0 {
      top: 0; z-index: 3;
      padding: 7px 14px 7px 22px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .set-group-header.depth-1 {
      top: var(--set-group-h); z-index: 2;
      padding: 6px 14px 6px 36px;
      font-size: 11px; font-weight: 500;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .set-group-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 8px; color: var(--muted);
      width: 8px; text-align: center;
      pointer-events: none;
    }
    .set-group-header.depth-0 .set-group-arrow { left: 8px; }
    .set-group-header.depth-1 .set-group-arrow { left: 22px; }
    .set-group-name { flex-shrink: 0; }
    .set-group-count {
      font-size: 10px; font-weight: 400;
      color: var(--muted);
      text-transform: none; letter-spacing: 0;
    }
    .set-group-dirty {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }

    /* Vertical guideline next to a depth-1 header indicates it's inside its top group. */
    .set-group-header.depth-1::before {
      content: '';
      position: absolute;
      left: 11px; top: 0; bottom: 0; width: 1px;
      background: var(--border);
    }

    .set-row {
      position: relative;
      cursor: pointer;
      transition: background 0.06s;
    }
    .set-row.active { background: var(--item-hover); }
    .set-row.expanded {
      background: var(--bg);
      cursor: default;
    }

    .set-row-head {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px 5px 22px;
      min-height: 26px;
    }
    .set-row.depth-1 .set-row-head { padding-left: 36px; }
    .set-row.expanded .set-row-head { padding-bottom: 4px; }

    /* Vertical guidelines: depth-0 items show one line under the SYSTEM column;
       depth-1 items show a second line under their sub-section column. */
    .set-row::before {
      content: '';
      position: absolute;
      left: 11px; top: 0; bottom: 0; width: 1px;
      background: var(--border);
    }
    .set-row.depth-1::after {
      content: '';
      position: absolute;
      left: 25px; top: 0; bottom: 0; width: 1px;
      background: var(--border);
    }

    .set-row-name {
      flex: 1; min-width: 0;
      font-size: 12px;
      color: var(--text-strong);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
    }
    .set-row.dirty .set-row-name { color: var(--accent); }

    .set-row-value {
      flex-shrink: 0;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--text);
      max-width: 260px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0.85;
    }
    .set-row-value.is-empty { color: var(--placeholder); font-style: italic; }

    .set-row-source {
      flex-shrink: 0;
      width: 16px; text-align: center;
      font-size: 10px; font-weight: 700;
      color: var(--muted);
      font-family: 'SF Mono', Menlo, Consolas, monospace;
    }
    .set-row-source.source-agent { color: var(--accent); }
    .set-row-source.source-global { color: var(--text); }

    .set-row-edit {
      display: flex; flex-direction: column; gap: 6px;
      padding: 0 14px 10px 22px;
    }
    .set-row.depth-1 .set-row-edit { padding-left: 36px; }
    .set-row-desc {
      font-size: 11px; line-height: 1.4;
      color: var(--muted);
    }
    .set-row-input {
      width: 100%;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px; padding: 4px 8px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text); outline: none;
      transition: border-color 0.12s;
    }
    .set-row-input:focus { border-color: var(--accent); }
    .set-row-input:disabled { opacity: 0.35; cursor: default; }
    .set-row-input::placeholder {
      color: var(--placeholder); font-style: italic;
    }

    .set-row-controls {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }

    .set-row-scopes {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .set-row-scope-label {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .set-row-scope {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid transparent;
      background: transparent; color: var(--muted);
      cursor: pointer;
      transition: background 0.08s, color 0.08s, border-color 0.08s;
    }
    .set-row-scope:hover { color: var(--text); }
    .set-row-scope.active {
      color: var(--accent); border-color: var(--accent);
    }

    .set-row-hint {
      flex: 1; text-align: right;
      font-size: 10px; color: var(--muted);
      font-style: italic;
    }

    .set-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .set-footer-badge {
      font-size: 11px; font-weight: 500;
      color: var(--accent);
      margin-right: auto;
    }

    /* ── Custom content ── */
    .edit-description {
      padding: 8px 14px; font-size: 12px; color: var(--muted);
    }
    .edit-error {
      padding: 4px 14px 8px; font-size: 12px; color: var(--error);
    }

    /* ── Action buttons ── */
    .actions {
      display: flex; gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      justify-content: flex-end;
    }
    .btn {
      font-family: inherit;
      font-size: 12px; font-weight: 500;
      padding: 5px 14px; border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: var(--item-hover); color: var(--text-strong); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn.primary {
      background: var(--accent); color: var(--accent-text);
      border-color: transparent;
    }
    .btn.primary:hover { opacity: 0.9; }

    /* ── Empty ── */
    .empty {
      padding: 20px 12px; color: var(--muted);
      text-align: center; font-size: 12px;
    }

    /* ── Hidden hint bar (kept for compatibility) ── */
    .hint { display: none; }
  </style>
</head>
<body>
  <div class="palette">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" class="search" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false">
    </div>
    <div id="results" class="results"></div>
    <div id="hintBar" class="hint"></div>
  </div>
  <script src="command-palette/ui/index.js" type="module"></script>
</body>
</html>

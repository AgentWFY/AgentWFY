<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command Palette</title>
  <style>
    :root {
      color-scheme: light dark;

      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --placeholder: #b0b0b0;
      --accent: #1a6fb5;
      --accent-text: #ffffff;
      --item-hover: rgba(0, 0, 0, 0.05);
      --kbd-bg: rgba(0, 0, 0, 0.06);
      --kbd-border: rgba(0, 0, 0, 0.1);
      --error: #e55;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #252526;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #808080;
        --placeholder: #666666;
        --accent: #2b7ab5;
        --accent-text: #ffffff;
        --item-hover: rgba(255, 255, 255, 0.05);
        --kbd-bg: rgba(255, 255, 255, 0.08);
        --kbd-border: rgba(255, 255, 255, 0.1);
        --error: #e55;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    body {
      padding: 8px;
    }

    .palette {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .breadcrumb {
      padding: 6px 14px 0;
      font-size: 11px;
      color: var(--muted);
      display: none;
    }

    .search {
      border: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-strong);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .search::placeholder {
      color: var(--placeholder);
    }

    .results {
      flex: 1;
      overflow: auto;
      padding: 4px;
    }

    .results::-webkit-scrollbar {
      width: 6px;
    }

    .results::-webkit-scrollbar-track {
      background: transparent;
    }

    .results::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .group-title {
      margin: 6px 8px 2px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .item {
      border: 0;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .item:hover {
      background: var(--item-hover);
    }

    .item.active {
      background: var(--accent);
      color: var(--accent-text);
    }

    .item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .item-title {
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-subtitle {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item.active .item-subtitle {
      color: rgba(255, 255, 255, 0.7);
    }

    .item-shortcut {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      line-height: 1.4;
    }

    .item.active .item-shortcut {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .setting-value {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 1px 6px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      line-height: 1.4;
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .setting-source {
      font-size: 10px;
      opacity: 0.7;
      font-style: italic;
      font-family: inherit;
    }

    .item.active .setting-value {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .item-chevron {
      flex-shrink: 0;
      font-size: 16px;
      line-height: 1;
      color: var(--muted);
      font-weight: 300;
    }

    .item.active .item-chevron {
      color: rgba(255, 255, 255, 0.7);
    }

    .edit-description {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .edit-error {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--error);
    }

    .empty {
      padding: 20px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .hint {
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      gap: 12px;
    }

    .hint-key {
      color: var(--text);
      font-size: 10px;
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 0 4px;
      font-family: inherit;
      line-height: 1.5;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="palette">
    <div id="breadcrumb" class="breadcrumb"></div>
    <input id="searchInput" class="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    <div id="results" class="results"></div>
    <div id="hintBar" class="hint">
      <span class="hint-item"><span class="hint-key">Enter</span> run</span>
      <span class="hint-item"><span class="hint-key">Esc</span> close</span>
      <span class="hint-item"><span class="hint-key">&uarr;&darr;</span> navigate</span>
    </div>
  </div>
  <script src="command-palette/ui/index.js" type="module"></script>
</body>
</html>

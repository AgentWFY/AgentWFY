<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command Palette</title>
  <style>
    :root {
      color-scheme: light dark;

      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --placeholder: #b0b0b0;
      --accent: #1a6fb5;
      --accent-text: #ffffff;
      --item-hover: rgba(0, 0, 0, 0.05);
      --kbd-bg: rgba(0, 0, 0, 0.06);
      --kbd-border: rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #252526;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #808080;
        --placeholder: #666666;
        --accent: #2b7ab5;
        --accent-text: #ffffff;
        --item-hover: rgba(255, 255, 255, 0.05);
        --kbd-bg: rgba(255, 255, 255, 0.08);
        --kbd-border: rgba(255, 255, 255, 0.1);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    body {
      padding: 8px;
    }

    .palette {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .search {
      border: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-strong);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .search::placeholder {
      color: var(--placeholder);
    }

    .results {
      flex: 1;
      overflow: auto;
      padding: 4px;
    }

    .results::-webkit-scrollbar {
      width: 6px;
    }

    .results::-webkit-scrollbar-track {
      background: transparent;
    }

    .results::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .group-title {
      margin: 6px 8px 2px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .item {
      border: 0;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .item:hover {
      background: var(--item-hover);
    }

    .item.active {
      background: var(--accent);
      color: var(--accent-text);
    }

    .item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .item-title {
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-subtitle {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item.active .item-subtitle {
      color: rgba(255, 255, 255, 0.7);
    }

    .item-shortcut {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      line-height: 1.4;
    }

    .item.active .item-shortcut {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .empty {
      padding: 20px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .hint {
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      gap: 12px;
    }

    .hint-key {
      color: var(--text);
      font-size: 10px;
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 0 4px;
      font-family: inherit;
      line-height: 1.5;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="palette">
    <input id="searchInput" class="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    <div id="results" class="results"></div>
    <div class="hint">
      <span class="hint-item"><span class="hint-key">Enter</span> run</span>
      <span class="hint-item"><span class="hint-key">Esc</span> close</span>
      <span class="hint-item"><span class="hint-key">&uarr;&darr;</span> navigate</span>
    </div>
  </div>
  <script>
    (() => {
      const bridge = window.commandPaletteBridge;
      const searchInput = document.getElementById('searchInput');
      const resultsEl = document.getElementById('results');

      /** @type {Array<{id:string,title:string,subtitle?:string,shortcut?:string,group:string,action:any}>} */
      let items = [];
      /** @type {Array<{id:string,title:string,subtitle?:string,shortcut?:string,group:string,action:any}>} */
      let filtered = [];
      let selectedIndex = 0;
      let actionInFlight = false;

      const clampSelectedIndex = () => {
        if (filtered.length === 0) {
          selectedIndex = 0;
          return;
        }
        selectedIndex = Math.max(0, Math.min(selectedIndex, filtered.length - 1));
      };

      const scoreMatches = (item, query) => {
        if (!query) return true;
        const haystack = `${item.title || ''} ${item.subtitle || ''} ${item.group || ''}`.toLowerCase();
        const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
        return tokens.every((token) => haystack.includes(token));
      };

      const updateActiveItem = () => {
        const items = resultsEl.querySelectorAll('.item');
        items.forEach((el, i) => {
          const idx = Number(/** @type {HTMLElement} */ (el).dataset.index);
          if (idx === selectedIndex) {
            el.classList.add('active');
          } else {
            el.classList.remove('active');
          }
        });
      };

      const scrollActiveIntoView = () => {
        const activeEl = resultsEl.querySelector('.item.active');
        if (activeEl) {
          activeEl.scrollIntoView({ block: 'nearest' });
        }
      };

      const render = () => {
        resultsEl.innerHTML = '';
        if (filtered.length === 0) {
          const emptyEl = document.createElement('div');
          emptyEl.className = 'empty';
          emptyEl.textContent = 'No matches';
          resultsEl.appendChild(emptyEl);
          return;
        }

        let lastGroup = '';
        filtered.forEach((item, index) => {
          if (item.group !== lastGroup) {
            lastGroup = item.group;
            const groupTitleEl = document.createElement('div');
            groupTitleEl.className = 'group-title';
            groupTitleEl.textContent = item.group;
            resultsEl.appendChild(groupTitleEl);
          }

          const itemButton = document.createElement('button');
          itemButton.type = 'button';
          itemButton.className = 'item' + (index === selectedIndex ? ' active' : '');
          itemButton.dataset.index = String(index);

          const contentEl = document.createElement('div');
          contentEl.className = 'item-content';

          const titleEl = document.createElement('div');
          titleEl.className = 'item-title';
          titleEl.textContent = item.title || '';
          contentEl.appendChild(titleEl);

          if (item.subtitle) {
            const subtitleEl = document.createElement('div');
            subtitleEl.className = 'item-subtitle';
            subtitleEl.textContent = item.subtitle;
            contentEl.appendChild(subtitleEl);
          }

          itemButton.appendChild(contentEl);

          if (item.shortcut) {
            const shortcutEl = document.createElement('span');
            shortcutEl.className = 'item-shortcut';
            shortcutEl.textContent = item.shortcut;
            itemButton.appendChild(shortcutEl);
          }

          resultsEl.appendChild(itemButton);
        });
      };

      const applyFilter = () => {
        const query = searchInput.value.trim();
        filtered = items.filter((item) => scoreMatches(item, query));
        clampSelectedIndex();
        render();
      };

      const selectNext = () => {
        if (filtered.length === 0) return;
        selectedIndex = (selectedIndex + 1) % filtered.length;
        updateActiveItem();
        scrollActiveIntoView();
      };

      const selectPrev = () => {
        if (filtered.length === 0) return;
        selectedIndex = (selectedIndex - 1 + filtered.length) % filtered.length;
        updateActiveItem();
        scrollActiveIntoView();
      };

      const runActionForIndex = async (index) => {
        if (actionInFlight) return;
        const item = filtered[index];
        if (!item) return;
        actionInFlight = true;
        try {
          await bridge.runAction(item.action);
        } catch (error) {
          console.error('Failed to run command palette action:', error);
        } finally {
          actionInFlight = false;
        }
      };

      const runSelected = async () => {
        if (filtered.length === 0) return;
        await runActionForIndex(selectedIndex);
      };

      const reloadItems = async () => {
        try {
          items = await bridge.listItems();
        } catch (error) {
          console.error('Failed to list command palette items:', error);
          items = [];
        }
        applyFilter();
      };

      const handleKeyDown = async (event) => {
        if (event.defaultPrevented) {
          return;
        }

        if (event.key === 'Escape') {
          event.preventDefault();
          await bridge.close();
          return;
        }

        if (event.key === 'ArrowDown' || event.key === 'Down' || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'j')) {
          event.preventDefault();
          selectNext();
          return;
        }

        if (event.key === 'ArrowUp' || event.key === 'Up' || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k')) {
          event.preventDefault();
          selectPrev();
          return;
        }

        if (event.key === 'Enter') {
          event.preventDefault();
          await runSelected();
        }
      };

      searchInput.addEventListener('keydown', (event) => {
        if (
          event.key === 'ArrowDown' ||
          event.key === 'Down' ||
          event.key === 'ArrowUp' ||
          event.key === 'Up' ||
          event.key === 'Enter' ||
          event.key === 'Escape'
        ) {
          void handleKeyDown(event);
        }
      }, true);

      window.addEventListener('keydown', (event) => {
        if (event.target === searchInput) {
          return;
        }
        void handleKeyDown(event);
      }, true);

      resultsEl.addEventListener('mouseover', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const itemEl = target.closest('.item');
        if (!(itemEl instanceof HTMLElement)) return;
        const index = Number(itemEl.dataset.index);
        if (!Number.isFinite(index) || index === selectedIndex) return;
        selectedIndex = index;
        updateActiveItem();
      });

      resultsEl.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const itemEl = target.closest('.item');
        if (!(itemEl instanceof HTMLElement)) return;
        event.preventDefault();
        const index = Number(itemEl.dataset.index);
        if (!Number.isFinite(index)) return;
        selectedIndex = index;
        updateActiveItem();
        void runActionForIndex(index);
      });

      searchInput.addEventListener('input', () => {
        selectedIndex = 0;
        applyFilter();
      });

      const focusSearchInput = () => {
        requestAnimationFrame(() => {
          searchInput.focus();
          searchInput.select();
        });
      };

      bridge.onOpened(async () => {
        searchInput.value = '';
        selectedIndex = 0;
        await reloadItems();
        focusSearchInput();
      });

      void reloadItems().then(() => {
        focusSearchInput();
      });
    })();
  </script>
</body>
</html>

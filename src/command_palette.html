<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command Palette</title>
  <style>
    :root {
      color-scheme: light dark;

      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --placeholder: #b0b0b0;
      --accent: #1a6fb5;
      --accent-text: #ffffff;
      --item-hover: rgba(0, 0, 0, 0.05);
      --kbd-bg: rgba(0, 0, 0, 0.06);
      --kbd-border: rgba(0, 0, 0, 0.1);
      --error: #e55;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #252526;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #808080;
        --placeholder: #666666;
        --accent: #2b7ab5;
        --accent-text: #ffffff;
        --item-hover: rgba(255, 255, 255, 0.05);
        --kbd-bg: rgba(255, 255, 255, 0.08);
        --kbd-border: rgba(255, 255, 255, 0.1);
        --error: #e55;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    body {
      padding: 8px;
    }

    .palette {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .breadcrumb {
      padding: 6px 14px 0;
      font-size: 11px;
      color: var(--muted);
      display: none;
    }

    .search {
      border: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-strong);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .search::placeholder {
      color: var(--placeholder);
    }

    .results {
      flex: 1;
      overflow: auto;
      padding: 4px;
    }

    .results::-webkit-scrollbar {
      width: 6px;
    }

    .results::-webkit-scrollbar-track {
      background: transparent;
    }

    .results::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .group-title {
      margin: 6px 8px 2px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .item {
      border: 0;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .item:hover {
      background: var(--item-hover);
    }

    .item.active {
      background: var(--accent);
      color: var(--accent-text);
    }

    .item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .item-title {
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-subtitle {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item.active .item-subtitle {
      color: rgba(255, 255, 255, 0.7);
    }

    .item-shortcut {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      line-height: 1.4;
    }

    .item.active .item-shortcut {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .setting-value {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 1px 6px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      line-height: 1.4;
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item.active .setting-value {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .edit-description {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .edit-error {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--error);
    }

    .empty {
      padding: 20px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .hint {
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      gap: 12px;
    }

    .hint-key {
      color: var(--text);
      font-size: 10px;
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 3px;
      padding: 0 4px;
      font-family: inherit;
      line-height: 1.5;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="palette">
    <div id="breadcrumb" class="breadcrumb"></div>
    <input id="searchInput" class="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    <div id="results" class="results"></div>
    <div id="hintBar" class="hint">
      <span class="hint-item"><span class="hint-key">Enter</span> run</span>
      <span class="hint-item"><span class="hint-key">Esc</span> close</span>
      <span class="hint-item"><span class="hint-key">&uarr;&darr;</span> navigate</span>
    </div>
  </div>
  <script>
    (() => {
      const bridge = window.commandPaletteBridge;
      const searchInput = document.getElementById('searchInput');
      const resultsEl = document.getElementById('results');
      const breadcrumbEl = document.getElementById('breadcrumb');
      const hintBar = document.getElementById('hintBar');

      /** @type {Array<{id:string,title:string,subtitle?:string,shortcut?:string,group:string,action:any,settingValue?:string,settingType?:string}>} */
      let items = [];
      /** @type {Array<{id:string,title:string,subtitle?:string,shortcut?:string,group:string,action:any,settingValue?:string,settingType?:string}>} */
      let filtered = [];
      let selectedIndex = 0;
      let actionInFlight = false;

      // --- Mode state ---
      /** @type {'normal' | 'settings' | 'editing'} */
      let mode = 'normal';
      /** @type {Array<{id:string,title:string,subtitle?:string,group:string,action:any,settingValue?:string,settingType?:string}>} */
      let settingsItems = [];
      /** @type {{ key: string, label: string, type: string, currentValue: string, description: string } | null} */
      let editingSetting = null;
      /** @type {string} */
      let editError = '';

      const clampSelectedIndex = () => {
        if (filtered.length === 0) {
          selectedIndex = 0;
          return;
        }
        selectedIndex = Math.max(0, Math.min(selectedIndex, filtered.length - 1));
      };

      const scoreMatches = (item, query) => {
        if (!query) return true;
        const haystack = `${item.title || ''} ${item.subtitle || ''} ${item.group || ''}`.toLowerCase();
        const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
        return tokens.every((token) => haystack.includes(token));
      };

      const updateActiveItem = () => {
        const items = resultsEl.querySelectorAll('.item');
        items.forEach((el) => {
          const idx = Number(/** @type {HTMLElement} */ (el).dataset.index);
          if (idx === selectedIndex) {
            el.classList.add('active');
          } else {
            el.classList.remove('active');
          }
        });
      };

      const scrollActiveIntoView = () => {
        const activeEl = resultsEl.querySelector('.item.active');
        if (activeEl) {
          activeEl.scrollIntoView({ block: 'nearest' });
        }
      };

      // --- Breadcrumb ---

      const updateBreadcrumb = () => {
        if (mode === 'normal') {
          breadcrumbEl.style.display = 'none';
          breadcrumbEl.textContent = '';
        } else if (mode === 'settings') {
          breadcrumbEl.style.display = 'block';
          breadcrumbEl.textContent = 'Settings';
        } else if (mode === 'editing' && editingSetting) {
          breadcrumbEl.style.display = 'block';
          breadcrumbEl.textContent = `Settings \u203A ${editingSetting.label}`;
        }
      };

      // --- Hint bar ---

      const updateHintBar = () => {
        if (mode === 'normal') {
          hintBar.innerHTML = `
            <span class="hint-item"><span class="hint-key">Enter</span> run</span>
            <span class="hint-item"><span class="hint-key">Esc</span> close</span>
            <span class="hint-item"><span class="hint-key">&uarr;&darr;</span> navigate</span>
          `;
        } else if (mode === 'settings') {
          hintBar.innerHTML = `
            <span class="hint-item"><span class="hint-key">Enter</span> edit</span>
            <span class="hint-item"><span class="hint-key">Esc</span> back</span>
            <span class="hint-item"><span class="hint-key">&uarr;&darr;</span> navigate</span>
          `;
        } else if (mode === 'editing') {
          hintBar.innerHTML = `
            <span class="hint-item"><span class="hint-key">Enter</span> save</span>
            <span class="hint-item"><span class="hint-key">Esc</span> back</span>
          `;
        }
      };

      // --- Render functions ---

      const renderItemList = (emptyText) => {
        resultsEl.innerHTML = '';
        if (filtered.length === 0) {
          const emptyEl = document.createElement('div');
          emptyEl.className = 'empty';
          emptyEl.textContent = emptyText;
          resultsEl.appendChild(emptyEl);
          return;
        }

        let lastGroup = '';
        filtered.forEach((item, index) => {
          if (item.group !== lastGroup) {
            lastGroup = item.group;
            const groupTitleEl = document.createElement('div');
            groupTitleEl.className = 'group-title';
            groupTitleEl.textContent = item.group;
            resultsEl.appendChild(groupTitleEl);
          }

          const itemButton = document.createElement('button');
          itemButton.type = 'button';
          itemButton.className = 'item' + (index === selectedIndex ? ' active' : '');
          itemButton.dataset.index = String(index);

          const contentEl = document.createElement('div');
          contentEl.className = 'item-content';

          const titleEl = document.createElement('div');
          titleEl.className = 'item-title';
          titleEl.textContent = item.title || '';
          contentEl.appendChild(titleEl);

          if (item.subtitle) {
            const subtitleEl = document.createElement('div');
            subtitleEl.className = 'item-subtitle';
            subtitleEl.textContent = item.subtitle;
            contentEl.appendChild(subtitleEl);
          }

          itemButton.appendChild(contentEl);

          if (item.shortcut) {
            const shortcutEl = document.createElement('span');
            shortcutEl.className = 'item-shortcut';
            shortcutEl.textContent = item.shortcut;
            itemButton.appendChild(shortcutEl);
          }

          if (item.settingValue !== undefined) {
            const valueEl = document.createElement('span');
            valueEl.className = 'setting-value';
            valueEl.textContent = item.settingValue || '(empty)';
            itemButton.appendChild(valueEl);
          }

          resultsEl.appendChild(itemButton);
        });
      };

      const renderEditing = () => {
        resultsEl.innerHTML = '';
        if (!editingSetting) return;

        if (editingSetting.type === 'boolean') {
          const trueItem = document.createElement('button');
          trueItem.type = 'button';
          trueItem.className = 'item' + (selectedIndex === 0 ? ' active' : '');
          trueItem.dataset.index = '0';
          const trueContent = document.createElement('div');
          trueContent.className = 'item-content';
          const trueTitle = document.createElement('div');
          trueTitle.className = 'item-title';
          trueTitle.textContent = 'true';
          trueContent.appendChild(trueTitle);
          trueItem.appendChild(trueContent);
          if (editingSetting.currentValue === 'true') {
            const badge = document.createElement('span');
            badge.className = 'setting-value';
            badge.textContent = 'current';
            trueItem.appendChild(badge);
          }
          resultsEl.appendChild(trueItem);

          const falseItem = document.createElement('button');
          falseItem.type = 'button';
          falseItem.className = 'item' + (selectedIndex === 1 ? ' active' : '');
          falseItem.dataset.index = '1';
          const falseContent = document.createElement('div');
          falseContent.className = 'item-content';
          const falseTitle = document.createElement('div');
          falseTitle.className = 'item-title';
          falseTitle.textContent = 'false';
          falseContent.appendChild(falseTitle);
          falseItem.appendChild(falseContent);
          if (editingSetting.currentValue === 'false') {
            const badge = document.createElement('span');
            badge.className = 'setting-value';
            badge.textContent = 'current';
            falseItem.appendChild(badge);
          }
          resultsEl.appendChild(falseItem);
        } else {
          // Show description
          const descEl = document.createElement('div');
          descEl.className = 'edit-description';
          descEl.textContent = editingSetting.description;
          resultsEl.appendChild(descEl);
        }

        if (editError) {
          const errorEl = document.createElement('div');
          errorEl.className = 'edit-error';
          errorEl.textContent = editError;
          resultsEl.appendChild(errorEl);
        }
      };

      const render = () => {
        if (mode === 'normal') renderItemList('No matches');
        else if (mode === 'settings') renderItemList('No settings found');
        else if (mode === 'editing') renderEditing();
      };

      const applyFilter = () => {
        const query = searchInput.value.trim();
        if (mode === 'normal') {
          filtered = items.filter((item) => scoreMatches(item, query));
        } else if (mode === 'settings') {
          filtered = settingsItems.filter((item) => scoreMatches(item, query));
        }
        clampSelectedIndex();
        render();
      };

      const selectNext = () => {
        const count = mode === 'editing' && editingSetting?.type === 'boolean' ? 2 : filtered.length;
        if (count === 0) return;
        selectedIndex = (selectedIndex + 1) % count;
        updateActiveItem();
        scrollActiveIntoView();
      };

      const selectPrev = () => {
        const count = mode === 'editing' && editingSetting?.type === 'boolean' ? 2 : filtered.length;
        if (count === 0) return;
        selectedIndex = (selectedIndex - 1 + count) % count;
        updateActiveItem();
        scrollActiveIntoView();
      };

      // --- Mode transitions ---

      const enterNormalMode = () => {
        mode = 'normal';
        editingSetting = null;
        editError = '';
        searchInput.value = '';
        searchInput.placeholder = 'Search...';
        updateBreadcrumb();
        updateHintBar();
        applyFilter();
        searchInput.focus();
      };

      const enterSettingsMode = async () => {
        mode = 'settings';
        editingSetting = null;
        editError = '';
        searchInput.value = '';
        searchInput.placeholder = 'Search settings...';
        selectedIndex = 0;
        updateBreadcrumb();
        updateHintBar();

        try {
          settingsItems = await bridge.listSettings();
        } catch (error) {
          console.error('Failed to list settings:', error);
          settingsItems = [];
        }
        applyFilter();
        searchInput.focus();
      };

      const enterEditingMode = (item) => {
        if (!item || !item.action || item.action.type !== 'edit-setting') return;
        mode = 'editing';
        editError = '';
        editingSetting = {
          key: item.action.settingKey,
          label: item.action.settingLabel,
          type: item.settingType || 'string',
          currentValue: item.settingValue || '',
          description: item.subtitle || '',
        };
        selectedIndex = 0;
        updateBreadcrumb();
        updateHintBar();

        if (editingSetting.type === 'boolean') {
          searchInput.value = '';
          searchInput.placeholder = 'Select value...';
          selectedIndex = editingSetting.currentValue === 'true' ? 0 : 1;
        } else {
          searchInput.value = editingSetting.currentValue;
          searchInput.placeholder = editingSetting.label;
        }

        render();
        searchInput.focus();
        if (editingSetting.type !== 'boolean') {
          searchInput.select();
        }
      };

      const saveEditingValue = async (value) => {
        if (!editingSetting) return;
        editError = '';

        try {
          const result = await bridge.updateSetting(editingSetting.key, value);
          if (result.success) {
            await enterSettingsMode();
          } else {
            editError = result.error || 'Failed to save';
            render();
          }
        } catch (error) {
          editError = 'Failed to save setting';
          render();
        }
      };

      // --- Action handling ---

      const runActionForIndex = async (index) => {
        if (actionInFlight) return;
        const item = filtered[index];
        if (!item) return;

        // Handle enter-settings locally
        if (item.action && item.action.type === 'enter-settings') {
          await enterSettingsMode();
          return;
        }

        // Handle open-settings-file locally then close
        if (item.action && item.action.type === 'open-settings-file') {
          actionInFlight = true;
          try {
            await bridge.openSettingsFile();
            await bridge.close();
          } catch (error) {
            console.error('Failed to open settings file:', error);
          } finally {
            actionInFlight = false;
          }
          return;
        }

        actionInFlight = true;
        try {
          await bridge.runAction(item.action);
        } catch (error) {
          console.error('Failed to run command palette action:', error);
        } finally {
          actionInFlight = false;
        }
      };

      const handleEnterKey = async () => {
        if (mode === 'normal') {
          if (filtered.length === 0) return;
          await runActionForIndex(selectedIndex);
        } else if (mode === 'settings') {
          if (filtered.length === 0) return;
          const item = filtered[selectedIndex];
          enterEditingMode(item);
        } else if (mode === 'editing') {
          if (!editingSetting) return;
          if (editingSetting.type === 'boolean') {
            await saveEditingValue(selectedIndex === 0);
          } else {
            await saveEditingValue(searchInput.value);
          }
        }
      };

      const reloadItems = async () => {
        try {
          items = await bridge.listItems();
        } catch (error) {
          console.error('Failed to list command palette items:', error);
          items = [];
        }
        applyFilter();
      };

      // --- Keyboard handling ---

      const handleKeyDown = async (event) => {
        if (event.defaultPrevented) {
          return;
        }

        if (event.key === 'Escape') {
          event.preventDefault();
          if (mode === 'editing') {
            await enterSettingsMode();
            return;
          }
          if (mode === 'settings') {
            enterNormalMode();
            return;
          }
          await bridge.close();
          return;
        }

        if (event.key === 'ArrowDown' || event.key === 'Down' || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'j')) {
          event.preventDefault();
          selectNext();
          return;
        }

        if (event.key === 'ArrowUp' || event.key === 'Up' || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k')) {
          event.preventDefault();
          selectPrev();
          return;
        }

        if (event.key === 'Enter') {
          event.preventDefault();
          await handleEnterKey();
        }
      };

      searchInput.addEventListener('keydown', (event) => {
        if (
          event.key === 'ArrowDown' ||
          event.key === 'Down' ||
          event.key === 'ArrowUp' ||
          event.key === 'Up' ||
          event.key === 'Enter' ||
          event.key === 'Escape'
        ) {
          void handleKeyDown(event);
        }
      }, true);

      window.addEventListener('keydown', (event) => {
        if (event.target === searchInput) {
          return;
        }
        void handleKeyDown(event);
      }, true);

      resultsEl.addEventListener('mouseover', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const itemEl = target.closest('.item');
        if (!(itemEl instanceof HTMLElement)) return;
        const index = Number(itemEl.dataset.index);
        if (!Number.isFinite(index) || index === selectedIndex) return;
        selectedIndex = index;
        updateActiveItem();
      });

      resultsEl.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const itemEl = target.closest('.item');
        if (!(itemEl instanceof HTMLElement)) return;
        event.preventDefault();
        const index = Number(itemEl.dataset.index);
        if (!Number.isFinite(index)) return;
        selectedIndex = index;
        updateActiveItem();

        if (mode === 'editing' && editingSetting?.type === 'boolean') {
          void saveEditingValue(index === 0);
        } else if (mode === 'settings') {
          const item = filtered[index];
          enterEditingMode(item);
        } else {
          void runActionForIndex(index);
        }
      });

      searchInput.addEventListener('input', () => {
        if (mode === 'editing') {
          editError = '';
          render();
          return;
        }
        selectedIndex = 0;
        applyFilter();
      });

      const focusSearchInput = () => {
        requestAnimationFrame(() => {
          searchInput.focus();
          searchInput.select();
        });
      };

      // --- Live updates from external config changes ---

      const unsubSettingChanged = bridge.onSettingChanged((detail) => {
        // Update settingsItems in memory
        for (const item of settingsItems) {
          if (item.action && item.action.type === 'edit-setting' && item.action.settingKey === detail.key) {
            item.settingValue = detail.value !== undefined ? String(detail.value) : '';
          }
        }

        if (mode === 'settings') {
          applyFilter();
        } else if (mode === 'editing' && editingSetting && editingSetting.key === detail.key) {
          editingSetting.currentValue = detail.value !== undefined ? String(detail.value) : '';
          render();
        }
      });

      window.addEventListener('beforeunload', () => {
        unsubSettingChanged();
      });

      // --- Lifecycle ---

      bridge.onOpened(async () => {
        mode = 'normal';
        editingSetting = null;
        editError = '';
        searchInput.value = '';
        searchInput.placeholder = 'Search...';
        selectedIndex = 0;
        updateBreadcrumb();
        updateHintBar();
        await reloadItems();
        focusSearchInput();
      });

      void reloadItems().then(() => {
        focusSearchInput();
      });
    })();
  </script>
</body>
</html>

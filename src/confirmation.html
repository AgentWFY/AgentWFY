<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Confirm</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --accent: #1a6fb5;
      --accent-hover: #155a94;
      --accent-text: #ffffff;
      --cancel-hover: rgba(0, 0, 0, 0.06);
      --danger: #d64545;
      --danger-hover: #b73a3a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #252526;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #808080;
        --accent: #2b7ab5;
        --accent-hover: #236497;
        --accent-text: #ffffff;
        --cancel-hover: rgba(255, 255, 255, 0.06);
        --danger: #d64545;
        --danger-hover: #b73a3a;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--text); }
    body { padding: 8px; }
    .dialog {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }
    .header {
      padding: 14px 16px 0;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-strong);
      margin: 0;
    }
    .body {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
    }
    /* Plugin info cards */
    .plugin-card {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .plugin-card + .plugin-card {
      margin-top: 8px;
    }
    .plugin-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-strong);
      margin: 0;
    }
    .plugin-version {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
    }
    .plugin-description {
      font-size: 12px;
      color: var(--text);
      margin: 4px 0 0;
      line-height: 1.4;
    }
    .plugin-meta {
      font-size: 11px;
      color: var(--muted);
      margin: 6px 0 0;
    }
    .plugin-warning {
      font-size: 12px;
      color: var(--danger);
      margin-top: 10px;
    }
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .btn {
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
    }
    .btn-cancel {
      background: transparent;
      color: var(--text);
    }
    .btn-cancel:hover { background: var(--cancel-hover); }
    .btn-confirm {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }
    .btn-confirm:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="header">
      <h2 class="title" id="title"></h2>
    </div>
    <div class="body" id="body"></div>
    <div class="footer">
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn btn-confirm" id="confirmBtn">Confirm</button>
    </div>
  </div>
  <script src="client/confirmation.js" type="module"></script>
</body>
</html>

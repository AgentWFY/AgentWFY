<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Welcome to AgentWFY</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f0f0f0;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #444444;
      --text-strong: #1a1a1a;
      --muted: #999999;
      --accent: #2b7ab5;
      --accent-hover: #236497;
      --accent-text: #ffffff;
      --cancel-hover: rgba(0, 0, 0, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #252526;
        --border: #3d3d3d;
        --text: #cccccc;
        --text-strong: #e0e0e0;
        --muted: #808080;
        --accent: #2b7ab5;
        --accent-hover: #236497;
        --accent-text: #ffffff;
        --cancel-hover: rgba(255, 255, 255, 0.06);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      -webkit-app-region: drag;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-strong);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 240px;
      -webkit-app-region: no-drag;
    }
    .btn {
      padding: 10px 20px;
      font-size: 13px;
      font-family: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
      text-align: center;
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--cancel-hover); }
  </style>
</head>
<body>
  <img class="icon" src="icon.png" alt="">
  <h1>Welcome to AgentWFY</h1>
  <p class="subtitle">Choose a directory to set up your workspace. This is where your views, docs, tasks, and data will live.</p>
  <div class="actions">
    <button class="btn btn-primary" id="getStarted">Get Started</button>
    <button class="btn btn-secondary" id="quit">Quit</button>
  </div>
  <script>
    document.getElementById('getStarted').addEventListener('click', async () => {
      const dir = await window.welcomeBridge.pickDirectory();
      // Window closes from main process on success
    });
    document.getElementById('quit').addEventListener('click', () => {
      window.welcomeBridge.quit();
    });
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plugins</title>
  <!--
    SECTIONS:
    style-layout     – page shell: header, content area
    style-components – plugin cards, badges, buttons, toggle switch
    script-data      – state, DB operations (load, toggle, uninstall)
    script-render    – DOM rendering, filtering
    script-init      – event wiring and startup
  -->
<style id="style-layout">
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: var(--font-family);
    background: var(--color-bg1);
    color: var(--color-text3);
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 20px 32px 0;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text4);
    margin: 0 0 4px;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--color-text1);
    margin-bottom: 16px;
  }
  .header-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--color-text2);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    font-family: var(--font-family);
    background: var(--color-input-bg);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-md);
    color: var(--color-text3);
    outline: none;
    transition: border var(--transition-fast);
  }
  .search-input::placeholder { color: var(--color-placeholder); }
  .search-input:focus { border-color: var(--color-focus-border); }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 32px 40px;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
</style>

<style id="style-components">
  .plugin-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .plugin-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--color-divider);
  }
  .plugin-row:last-child { border-bottom: none; }
  .plugin-info {
    flex: 1;
    min-width: 0;
  }
  .plugin-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .plugin-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text4);
  }
  .plugin-version {
    font-size: 11px;
    color: var(--color-text1);
    font-family: var(--font-mono);
  }
  .badge-disabled {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--color-bg3);
    color: var(--color-text2);
    font-weight: 600;
  }
  .plugin-desc {
    font-size: 12px;
    color: var(--color-text2);
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .plugin-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--color-text1);
    margin-top: 2px;
  }
  .plugin-meta span { white-space: nowrap; }
  .plugin-meta a {
    color: var(--color-text2);
    text-decoration: none;
  }
  .plugin-meta a:hover { text-decoration: underline; }
  .plugin-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--color-bg3);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    transition: background var(--transition-fast), border-color var(--transition-fast);
  }
  .toggle input:checked + .toggle-track {
    background: var(--color-accent);
    border-color: var(--color-accent);
  }
  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform var(--transition-fast);
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-knob {
    transform: translateX(16px);
  }

  .btn {
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--font-family);
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text3);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
  }
  .btn:hover { background: var(--color-bg3); color: var(--color-text4); }
  .btn-danger:hover {
    color: var(--color-red-fg);
    background: var(--color-red-bg);
    border-color: transparent;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .btn-refresh {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px 8px;
    flex-shrink: 0;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text2);
    font-size: 14px;
  }
  .plugin-count {
    font-size: 12px;
    color: var(--color-text1);
    margin-bottom: 12px;
  }
</style>

</head>
<body>

<div class="header">
  <h1>Plugins</h1>
  <div class="subtitle">Manage installed plugins. Toggle to enable or disable, or uninstall to remove completely.</div>
  <div class="header-row">
    <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" placeholder="Search plugins..." autocomplete="off" spellcheck="false">
    </div>
    <button class="btn btn-refresh" id="refreshBtn" title="Refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</div>

<div class="content" id="pluginsContainer"></div>

<script id="script-data">
  let plugins = [];

  async function loadPlugins() {
    const rows = await window.agentwfy.runSql({
      target: 'agent',
      sql: 'SELECT name, description, version, author, repository, license, enabled FROM plugins ORDER BY name'
    });
    plugins = rows.map(r => ({
      name: r.name,
      description: r.description || '',
      version: r.version || '',
      author: r.author || '',
      repository: r.repository || '',
      license: r.license || '',
      enabled: !!r.enabled,
    }));
  }

  async function togglePlugin(name) {
    try {
      const result = await window.agentwfy.requestTogglePlugin(name);
      if (result.toggled) {
        const p = plugins.find(p => p.name === name);
        if (p) p.enabled = result.enabled;
      }
      renderPlugins();
    } catch {
      renderPlugins();
    }
  }

  async function uninstallPlugin(name) {
    try {
      const result = await window.agentwfy.requestUninstallPlugin(name);
      if (result.uninstalled) {
        await loadPlugins();
        renderPlugins();
      }
    } catch {
      // handled by status line
    }
  }
</script>

<script id="script-render">
  const _escDiv = document.createElement('div');
  function esc(s) {
    _escDiv.textContent = s;
    return _escDiv.innerHTML.replace(/"/g, '&quot;');
  }

  function renderPlugins() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    let filtered = plugins;
    if (query) {
      filtered = plugins.filter(p =>
        p.name.toLowerCase().includes(query) ||
        p.description.toLowerCase().includes(query)
      );
    }

    const container = document.getElementById('pluginsContainer');

    if (plugins.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>' +
          '</svg>' +
          '<div style="margin-top: 12px">No plugins installed</div>' +
          '<div style="font-size: 12px; margin-top: 4px; color: var(--color-text1)">Install plugins via the command palette or programmatically.</div>' +
        '</div>';
      return;
    }

    if (filtered.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' +
          '</svg>' +
          '<div>No plugins match your search</div>' +
        '</div>';
      return;
    }

    const enabledCount = filtered.filter(p => p.enabled).length;
    const totalCount = filtered.length;

    let h = '<div class="plugin-count">' + totalCount + ' plugin' + (totalCount !== 1 ? 's' : '');
    if (enabledCount < totalCount) {
      h += ' (' + enabledCount + ' enabled)';
    }
    h += '</div>';
    h += '<div class="plugin-list">';

    for (const p of filtered) {
      h += '<div class="plugin-row" data-name="' + esc(p.name) + '">';
      h += '  <div class="plugin-info">';
      h += '    <div class="plugin-name-row">';
      h += '      <span class="plugin-name">' + esc(p.name) + '</span>';
      if (p.version) {
        h += '      <span class="plugin-version">v' + esc(p.version) + '</span>';
      }
      if (!p.enabled) {
        h += '      <span class="badge-disabled">disabled</span>';
      }
      h += '    </div>';
      if (p.description) {
        h += '    <div class="plugin-desc">' + esc(p.description) + '</div>';
      }
      if (p.author || p.license || p.repository) {
        h += '    <div class="plugin-meta">';
        if (p.author) h += '<span>' + esc(p.author) + '</span>';
        if (p.license) h += '<span>' + esc(p.license) + '</span>';
        if (p.repository) h += '<a href="' + esc(p.repository) + '" target="_blank">' + esc(p.repository) + '</a>';
        h += '    </div>';
      }
      h += '  </div>';
      h += '  <div class="plugin-actions">';
      h += '    <label class="toggle" title="' + (p.enabled ? 'Disable' : 'Enable') + '">';
      h += '      <input type="checkbox" data-action="toggle" data-name="' + esc(p.name) + '"' + (p.enabled ? ' checked' : '') + '>';
      h += '      <div class="toggle-track"></div>';
      h += '      <div class="toggle-knob"></div>';
      h += '    </label>';
      h += '    <button class="btn btn-danger" data-action="uninstall" data-name="' + esc(p.name) + '">Uninstall</button>';
      h += '  </div>';
      h += '</div>';
    }

    h += '</div>';
    container.innerHTML = h;
  }

</script>

<script id="script-init">
  (async () => {
    const container = document.getElementById('pluginsContainer');

    container.addEventListener('change', e => {
      const input = e.target.closest('[data-action="toggle"]');
      if (!input) return;
      e.preventDefault();
      togglePlugin(input.dataset.name);
    });

    container.addEventListener('click', e => {
      const btn = e.target.closest('[data-action="uninstall"]');
      if (!btn) return;
      uninstallPlugin(btn.dataset.name);
    });

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      await loadPlugins();
      renderPlugins();
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderPlugins, 150);
    });

    await loadPlugins();
    renderPlugins();
    document.getElementById('searchInput').focus();
  })();
</script>
</body>
</html>

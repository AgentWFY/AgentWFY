<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Source Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-family);
  background: var(--color-bg1);
  color: var(--color-text3);
  height: 100vh;
  display: flex;
  overflow: hidden;
}
svg.ic {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  vertical-align: -2px;
}

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px;
  border-right: 1px solid var(--color-border);
  background: var(--color-bg2);
  display: flex; flex-direction: column;
}
.sidebar-top { padding: 10px 10px 0; }
.tabs { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 8px; }
.tab {
  padding: 5px 10px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: none; background: none;
  color: var(--color-text2); border-radius: 6px;
  font-family: var(--font-family); white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all var(--transition-fast);
}
.tab:hover { color: var(--color-text3); background: var(--color-item-hover); }
.tab.active { color: var(--color-accent); background: color-mix(in srgb, var(--color-accent) 10%, transparent); }
.tab .cnt {
  font-size: 9px; font-weight: 600;
  background: var(--color-bg3); color: var(--color-text1);
  padding: 0 5px; border-radius: 6px; line-height: 16px;
}
.tab.active .cnt {
  background: color-mix(in srgb, var(--color-accent) 18%, transparent);
  color: var(--color-accent);
}
.toolbar {
  display: flex; gap: 4px; padding-bottom: 10px;
  border-bottom: 1px solid var(--color-divider);
}
.toolbar input {
  flex: 1; min-width: 0; padding: 6px 10px;
  border: 1px solid var(--color-input-border); border-radius: 6px;
  background: var(--color-input-bg); color: var(--color-text3);
  font-size: 12px; font-family: var(--font-family); outline: none;
  transition: border var(--transition-fast);
}
.toolbar input:focus { border-color: var(--color-focus-border); }
.toolbar input::placeholder { color: var(--color-placeholder); }
.tool-btn {
  padding: 4px 8px; border-radius: 6px;
  border: 1px solid var(--color-border);
  background: var(--color-bg3); color: var(--color-text2);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-family);
  transition: all var(--transition-fast);
}
.tool-btn:hover { color: var(--color-accent); border-color: var(--color-accent); }

/* List */
.list { flex: 1; overflow-y: auto; padding: 4px 0; }
.item {
  padding: 8px 12px; cursor: pointer;
  transition: background var(--transition-fast);
}
.item:hover { background: var(--color-item-hover); }
.item.active { background: var(--color-surface); }
.item-name {
  font-size: 12px; font-weight: 500;
  font-family: var(--font-mono); word-break: break-all; line-height: 1.4;
}
.item-meta {
  font-size: 10px; color: var(--color-text1);
  margin-top: 2px; display: flex; gap: 6px; align-items: center;
}

/* Content */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0; gap: 10px;
}
.hd-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.hd-title {
  font-size: 13px; font-weight: 600; font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hd-info { font-size: 11px; color: var(--color-text1); white-space: nowrap; }
.hd-actions { display: flex; gap: 4px; flex-shrink: 0; }
.dirty { display: inline-block; width: 7px; height: 7px; background: var(--color-accent); border-radius: 50%; }

/* Type badges */
.bt {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
}
.bt-docs { background: var(--color-yellow-bg); color: var(--color-yellow-fg); }
.bt-views { background: color-mix(in srgb, var(--color-accent) 15%, transparent); color: var(--color-accent); }
.bt-tasks { background: color-mix(in srgb, var(--color-green-fg) 15%, transparent); color: var(--color-green-fg); }
.bt-triggers { background: color-mix(in srgb, #61afef 15%, transparent); color: #61afef; }
.bt-plugins { background: color-mix(in srgb, #c678dd 15%, transparent); color: #c678dd; }
.bt-config { background: color-mix(in srgb, var(--color-green-fg) 15%, transparent); color: var(--color-green-fg); }
.bt-modules { background: color-mix(in srgb, #e5c07b 15%, transparent); color: #e5c07b; }

/* Status badges */
.st { font-size: 9px; padding: 1px 5px; border-radius: 6px; font-weight: 600; }
.st-on { background: var(--color-green-bg); color: var(--color-green-fg); }
.st-off { background: color-mix(in srgb, var(--color-red-fg) 12%, transparent); color: var(--color-red-fg); }
.st-schedule { background: color-mix(in srgb, #61afef 12%, transparent); color: #61afef; }
.st-http { background: color-mix(in srgb, var(--color-green-fg) 12%, transparent); color: var(--color-green-fg); }
.st-event { background: color-mix(in srgb, #d19a66 12%, transparent); color: #d19a66; }

/* Buttons */
.btn {
  border: 1px solid var(--color-border); padding: 4px 10px;
  border-radius: 6px; cursor: pointer; font-size: 11px;
  font-family: var(--font-family);
  display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
  background: var(--color-bg3); color: var(--color-text2);
  transition: all var(--transition-fast);
}
.btn:hover { background: var(--color-item-hover); color: var(--color-text3); }
.btn-primary { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-green { background: var(--color-green-fg); border-color: var(--color-green-fg); color: #fff; }
.btn-green:hover { filter: brightness(1.1); }
.btn-danger { color: var(--color-red-fg); }
.btn-danger:hover { background: var(--color-red-fg); border-color: var(--color-red-fg); color: #fff; }

/* Code viewer */
.code-body { flex: 1; overflow: auto; padding: 12px 16px; }
.code-wrap { display: flex; min-width: max-content; }
.ln {
  text-align: right; padding-right: 12px;
  color: var(--color-text1); font-family: var(--font-mono);
  font-size: 12px; line-height: 1.65; user-select: none; opacity: 0.4;
  border-right: 1px solid var(--color-divider); margin-right: 12px;
  position: sticky; left: 0; background: var(--color-bg1); z-index: 1;
}
.code-body pre { margin: 0; font-family: var(--font-mono); font-size: 12px; line-height: 1.65; white-space: pre; tab-size: 2; }
.code-body code { font-family: var(--font-mono); font-size: 12px; }

/* Editor */
.editor-body { flex: 1; overflow: hidden; display: flex; }
.editor-body textarea {
  width: 100%; height: 100%; resize: none;
  border: none; outline: none;
  background: transparent; color: var(--color-text3);
  font-family: var(--font-mono); font-size: 12px;
  line-height: 1.65; padding: 12px 16px; tab-size: 2;
}

/* Run output */
.run-out { border-top: 1px solid var(--color-divider); max-height: 200px; overflow-y: auto; background: var(--color-bg2); flex-shrink: 0; }
.run-out-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px; border-bottom: 1px solid var(--color-divider);
  font-size: 11px; font-weight: 600; color: var(--color-text2);
}
.run-out-body {
  padding: 8px 16px; font-family: var(--font-mono); font-size: 11px;
  line-height: 1.6; white-space: pre-wrap; word-break: break-all;
}
.run-st { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
.run-st.running { background: color-mix(in srgb, var(--color-accent) 15%, transparent); color: var(--color-accent); }
.run-st.success { background: var(--color-green-bg); color: var(--color-green-fg); }
.run-st.error { background: color-mix(in srgb, var(--color-red-fg) 15%, transparent); color: var(--color-red-fg); }
.log-error { color: var(--color-red-fg); }
.log-warn { color: var(--color-yellow-fg); }

/* Detail view */
.detail { padding: 16px 20px; max-width: 600px; }
.detail-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: baseline; }
.detail-label { font-size: 11px; font-weight: 600; color: var(--color-text1); min-width: 80px; text-transform: uppercase; letter-spacing: 0.3px; }
.detail-value { font-size: 13px; font-family: var(--font-mono); color: var(--color-text3); word-break: break-all; flex: 1; }
.detail-block {
  background: var(--color-bg2); border: 1px solid var(--color-divider);
  border-radius: 6px; padding: 10px 12px; font-family: var(--font-mono);
  font-size: 12px; line-height: 1.6; white-space: pre-wrap;
}
.detail input, .detail select, .detail textarea {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--color-input-border); border-radius: 6px;
  background: var(--color-input-bg); color: var(--color-text3);
  font-size: 12px; font-family: var(--font-family); outline: none;
}
.detail textarea { font-family: var(--font-mono); resize: vertical; }
.detail input:focus, .detail select:focus, .detail textarea:focus { border-color: var(--color-focus-border); }

/* Description bar */
.desc-bar { padding: 8px 16px; border-bottom: 1px solid var(--color-divider); font-size: 12px; color: var(--color-text2); }

/* Plugin info bar */
.plugin-info {
  padding: 10px 16px; border-bottom: 1px solid var(--color-divider);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}

/* Config table */
.cfg-table { width: 100%; border-collapse: collapse; }
.cfg-table th {
  text-align: left; font-size: 10px; font-weight: 600; color: var(--color-text2);
  text-transform: uppercase; letter-spacing: 0.3px;
  padding: 8px 14px; border-bottom: 2px solid var(--color-divider);
  position: sticky; top: 0; background: var(--color-bg1);
}
.cfg-table td { padding: 8px 14px; border-bottom: 1px solid var(--color-divider); font-size: 12px; vertical-align: top; }
.cfg-table tr:hover td { background: var(--color-item-hover); }
.cfg-key { font-family: var(--font-mono); font-weight: 500; color: var(--color-accent); }
.cfg-val { font-family: var(--font-mono); word-break: break-all; }
.cfg-actions { white-space: nowrap; text-align: right; }
.cfg-actions button { background: none; border: none; cursor: pointer; padding: 2px 6px; color: var(--color-text1); transition: color var(--transition-fast); }
.cfg-actions button:hover { color: var(--color-text3); }
.cfg-actions button.del:hover { color: var(--color-red-fg); }

/* Config info box */
.info-box {
  margin: 12px 0; padding: 10px 14px;
  background: color-mix(in srgb, var(--color-accent) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-accent) 20%, transparent);
  border-radius: 6px; font-size: 12px; color: var(--color-text2); line-height: 1.5;
}
.info-box code { font-family: var(--font-mono); font-size: 11px; background: var(--color-bg3); padding: 1px 5px; border-radius: 3px; }

/* Config value display */
.cfg-value-display {
  font-family: var(--font-mono); font-size: 14px;
  padding: 10px 14px; background: var(--color-bg2);
  border: 1px solid var(--color-divider); border-radius: 6px;
}
.cfg-edit-input {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--color-input-border); border-radius: 6px;
  background: var(--color-input-bg); color: var(--color-text3);
  font-family: var(--font-mono); font-size: 13px; outline: none;
}
.cfg-edit-input:focus { border-color: var(--color-focus-border); }

/* Empty state */
.empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--color-text1); font-size: 13px; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 8px 16px; border-radius: 6px;
  font-size: 12px; color: #fff; z-index: 999;
  opacity: 0; transform: translateY(8px);
  transition: all 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--color-green-fg); }
.toast.error { background: var(--color-red-fg); }

/* Modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--color-bg1); border: 1px solid var(--color-border);
  border-radius: 10px; padding: 20px 24px; width: 400px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
.modal label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--color-text2); margin-bottom: 4px; margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--color-input-border); border-radius: 6px;
  background: var(--color-input-bg); color: var(--color-text3);
  font-size: 12px; font-family: var(--font-family); outline: none;
}
.modal textarea { font-family: var(--font-mono); resize: vertical; }
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--color-focus-border); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Syntax highlighting */
.hl-tag{color:#e06c75}.hl-attr{color:#d19a66}.hl-aval{color:#98c379}
.hl-str{color:#98c379}.hl-kw{color:#c678dd}.hl-num{color:#d19a66}
.hl-cmt{color:#5c6370;font-style:italic}.hl-fn{color:#61afef}
.hl-prop{color:#e06c75}.hl-val{color:#d19a66}.hl-sel{color:#e5c07b}
.hl-punct{color:#abb2bf}.hl-ent{color:#56b6c2}.hl-doctype{color:#5c6370}
@media(prefers-color-scheme:light){
  .hl-tag{color:#be3631}.hl-attr{color:#9a6600}.hl-aval{color:#50852a}
  .hl-str{color:#50852a}.hl-kw{color:#a626a4}.hl-num{color:#986801}
  .hl-cmt{color:#a0a1a7;font-style:italic}.hl-fn{color:#4078f2}
  .hl-prop{color:#be3631}.hl-val{color:#986801}.hl-sel{color:#c18401}
  .hl-punct{color:#383a42}.hl-ent{color:#0184bc}.hl-doctype{color:#a0a1a7}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="tabs" id="tabs"></div>
    <div class="toolbar">
      <input type="text" id="search" placeholder="Filter..." oninput="renderList()">
      <button class="tool-btn" onclick="loadAll()" title="Refresh">
        <svg class="ic" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>
      </button>
      <button class="tool-btn" id="createBtn" onclick="showCreateModal()" style="display:none" title="Create">
        <svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="list" id="list"></div>
</div>

<main class="content" id="content">
  <div class="empty">Select an item to inspect</div>
</main>

<div id="modal"></div>
<div class="toast" id="toast"></div>

<script>
// ── Syntax Highlighting ──

function W(cls, text) { return '<span class="hl-' + cls + '">' + text + '</span>'; }

function highlight(src, lang) {
  if (lang === 'html') return highlightHTML(src);
  if (lang === 'js')   return highlightJS(src);
  if (lang === 'css')  return highlightCSS(src);
  if (lang === 'md')   return highlightMarkdown(src);
  return esc(src);
}

function highlightHTML(src) {
  let out = '', i = 0;
  const len = src.length;
  while (i < len) {
    if (src.startsWith('<!--', i)) {
      const end = src.indexOf('-->', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end + 3);
      out += W('cmt', esc(slice)); i += slice.length; continue;
    }
    if (src.startsWith('<!', i) && !src.startsWith('<!--', i)) {
      const end = src.indexOf('>', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end + 1);
      out += W('doctype', esc(slice)); i += slice.length; continue;
    }
    if (src.slice(i).match(/^<style[^>]*>/i)) {
      const tagEnd = src.indexOf('>', i);
      out += highlightTag(src.slice(i, tagEnd + 1)); i = tagEnd + 1;
      const closeIdx = src.toLowerCase().indexOf('<\/style>', i);
      const cssBlock = closeIdx === -1 ? src.slice(i) : src.slice(i, closeIdx);
      out += highlightCSS(cssBlock); i += cssBlock.length;
      if (closeIdx !== -1) { out += W('tag', esc('</' + 'style>')); i += 8; }
      continue;
    }
    if (src.slice(i).match(/^<script[^>]*>/i)) {
      const tagEnd = src.indexOf('>', i);
      out += highlightTag(src.slice(i, tagEnd + 1)); i = tagEnd + 1;
      const closeIdx = src.toLowerCase().indexOf('</' + 'script>', i);
      const jsBlock = closeIdx === -1 ? src.slice(i) : src.slice(i, closeIdx);
      out += highlightJS(jsBlock); i += jsBlock.length;
      if (closeIdx !== -1) { out += W('tag', esc('</' + 'script>')); i += 9; }
      continue;
    }
    if (src.startsWith('</', i)) {
      const end = src.indexOf('>', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end + 1);
      out += W('tag', esc(slice)); i += slice.length; continue;
    }
    if (src[i] === '<' && i + 1 < len && /[a-zA-Z]/.test(src[i + 1])) {
      let end = i + 1, inQ = false, qChar = '';
      while (end < len) {
        const c = src[end];
        if (inQ) { if (c === qChar) inQ = false; }
        else { if (c === '"' || c === "'") { inQ = true; qChar = c; } else if (c === '>') { end++; break; } }
        end++;
      }
      out += highlightTag(src.slice(i, end)); i = end; continue;
    }
    if (src[i] === '&') {
      const semi = src.indexOf(';', i);
      if (semi !== -1 && semi - i < 10) {
        out += W('ent', esc(src.slice(i, semi + 1))); i = semi + 1; continue;
      }
    }
    out += esc(src[i]); i++;
  }
  return out;
}

function highlightTag(tag) {
  const m = tag.match(/^(<\/?)([a-zA-Z][a-zA-Z0-9-]*)/);
  if (!m) return W('tag', esc(tag));
  let out = W('tag', esc(m[1])) + W('tag', esc(m[2]));
  let rest = tag.slice(m[0].length);
  const attrRe = /([\s]+)([a-zA-Z_:][a-zA-Z0-9_.:-]*)(?:(\s*=\s*)(?:"([^"]*)"|'([^']*)'|([^\s>]+)))?/g;
  let lastIdx = 0, am;
  while ((am = attrRe.exec(rest)) !== null) {
    if (am.index > lastIdx) out += esc(rest.slice(lastIdx, am.index));
    out += am[1] + W('attr', esc(am[2]));
    if (am[3] !== undefined) {
      out += esc(am[3]);
      if (am[4] !== undefined) out += W('aval', '&quot;' + esc(am[4]) + '&quot;');
      else if (am[5] !== undefined) out += W('aval', "'" + esc(am[5]) + "'");
      else if (am[6] !== undefined) out += W('aval', esc(am[6]));
    }
    lastIdx = am.index + am[0].length;
  }
  if (lastIdx < rest.length) out += esc(rest.slice(lastIdx));
  return out;
}

function highlightCSS(src) {
  let out = '', i = 0;
  const len = src.length;
  while (i < len) {
    if (src.startsWith('/*', i)) {
      const end = src.indexOf('*/', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end + 2);
      out += W('cmt', esc(slice)); i += slice.length; continue;
    }
    if (src[i] === '"' || src[i] === "'") {
      const q = src[i]; let j = i + 1;
      while (j < len && src[j] !== q) { if (src[j] === '\\') j++; j++; }
      if (j < len) j++;
      out += W('str', esc(src.slice(i, j))); i = j; continue;
    }
    const numM = src.slice(i).match(/^(-?\d+\.?\d*)(px|em|rem|%|vh|vw|vmin|vmax|s|ms|deg|fr|ch)?\b/);
    if (numM && (i === 0 || !/[a-zA-Z_-]/.test(src[i-1]))) {
      out += W('num', esc(numM[0])); i += numM[0].length; continue;
    }
    const hexM = src.slice(i).match(/^#[0-9a-fA-F]{3,8}\b/);
    if (hexM) { out += W('num', esc(hexM[0])); i += hexM[0].length; continue; }
    const fnM = src.slice(i).match(/^(var|calc|rgb|rgba|hsl|hsla|color-mix|linear-gradient|radial-gradient|url|min|max|clamp|env)\s*\(/);
    if (fnM) { out += W('fn', esc(fnM[1])) + esc('('); i += fnM[0].length; continue; }
    const atM = src.slice(i).match(/^@[a-zA-Z-]+/);
    if (atM) { out += W('kw', esc(atM[0])); i += atM[0].length; continue; }
    if (src.startsWith('!important', i)) { out += W('kw', '!important'); i += 10; continue; }
    out += esc(src[i]); i++;
  }
  return out;
}

function highlightJS(src) {
  const KW = new Set(['const','let','var','function','return','if','else','for','while',
    'do','switch','case','break','continue','new','this','class','extends','super',
    'import','export','from','default','try','catch','finally','throw','typeof','instanceof',
    'in','of','async','await','yield','delete','void','null','undefined','true','false',
    'NaN','Infinity','static','get','set','constructor']);
  let out = '', i = 0;
  const len = src.length;
  while (i < len) {
    if (src.startsWith('//', i)) {
      const end = src.indexOf('\n', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end);
      out += W('cmt', esc(slice)); i += slice.length; continue;
    }
    if (src.startsWith('/*', i)) {
      const end = src.indexOf('*/', i);
      const slice = end === -1 ? src.slice(i) : src.slice(i, end + 2);
      out += W('cmt', esc(slice)); i += slice.length; continue;
    }
    if (src[i] === '`') {
      let j = i + 1, result = esc('`');
      while (j < len) {
        if (src[j] === '\\') { result += esc(src.slice(j, j+2)); j += 2; continue; }
        if (src[j] === '`') { result += esc('`'); j++; break; }
        if (src[j] === '$' && j+1 < len && src[j+1] === '{') {
          result += '</span><span class="hl-punct">' + esc('${') + '</span>';
          j += 2; let braces = 1;
          while (j < len && braces > 0) {
            if (src[j] === '{') braces++;
            else if (src[j] === '}') { braces--; if (braces === 0) break; }
            j++;
          }
          result += '<span class="hl-punct">' + esc('}') + '</span><span class="hl-str">';
          if (j < len) j++;
          continue;
        }
        result += esc(src[j]); j++;
      }
      out += W('str', result); i = j; continue;
    }
    if (src[i] === '"' || src[i] === "'") {
      const q = src[i]; let j = i + 1;
      while (j < len && src[j] !== q && src[j] !== '\n') { if (src[j] === '\\') j++; j++; }
      if (j < len && src[j] === q) j++;
      out += W('str', esc(src.slice(i, j))); i = j; continue;
    }
    const numM = src.slice(i).match(/^(0x[0-9a-fA-F]+|0b[01]+|0o[0-7]+|\d+\.?\d*([eE][+-]?\d+)?)/);
    if (numM && (i === 0 || !/[a-zA-Z_$]/.test(src[i-1]))) {
      out += W('num', esc(numM[0])); i += numM[0].length; continue;
    }
    const wordM = src.slice(i).match(/^[a-zA-Z_$][a-zA-Z0-9_$]*/);
    if (wordM) {
      const w = wordM[0];
      if (KW.has(w)) out += W('kw', esc(w));
      else if (i + w.length < len && src[i + w.length] === '(') out += W('fn', esc(w));
      else out += esc(w);
      i += w.length; continue;
    }
    if (src.startsWith('=>', i)) { out += W('kw', '=&gt;'); i += 2; continue; }
    out += esc(src[i]); i++;
  }
  return out;
}

function highlightMarkdown(src) {
  return src.split('\n').map(line => {
    const hm = line.match(/^(#{1,6})\s(.*)$/);
    if (hm) return W('kw', esc(hm[1])) + ' ' + W('tag', esc(hm[2]));
    let l = esc(line);
    l = l.replace(/\*\*(.+?)\*\*/g, W('tag', '**$1**'));
    l = l.replace(/\`([^\`]+)\`/g, W('str', '`$1`'));
    l = l.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '[' + W('fn', '$1') + '](' + W('str', '$2') + ')');
    if (/^\s*[-*]\s/.test(line)) l = l.replace(/^(\s*)([-*])/, '$1' + W('kw', '$2'));
    return l;
  }).join('\n');
}

// ── State & Helpers ──

const agy = window.agentwfy;
const $ = id => document.getElementById(id);
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let mode = 'docs', selected = null, editing = false, dirty = false, lastRun = null;

const IC = {
  edit: '<svg class="ic" viewBox="0 0 24 24"><path d="M17 3l4 4L7 21H3v-4Z"/></svg>',
  save: '<svg class="ic" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
  x: '<svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  play: '<svg class="ic" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  trash: '<svg class="ic" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  copy: '<svg class="ic" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
};

function fmtSize(n) { return n > 1024 ? (n / 1024).toFixed(1) + ' KB' : n + ' B'; }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(/^\d{10}$/.test(String(ts)) ? ts * 1000 : ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}
function fmtTimeout(ms) { return !ms ? 'default' : ms >= 60000 ? (ms / 60000) + 'm' : (ms / 1000) + 's'; }
function lineNums(c) { const n = (c || '').split('\n').length; return Array.from({ length: n }, (_, i) => i + 1).join('\n'); }

function detectLang(item) {
  if (item.type === 'views') return 'html';
  if (item.type === 'tasks' || item.type === 'plugins') return 'js';
  const name = (item.name || '').toLowerCase();
  if (name.endsWith('.html') || name.endsWith('.htm')) return 'html';
  if (name.endsWith('.css')) return 'css';
  if (name.endsWith('.js')) return 'js';
  const c = (item.content || '').trimStart();
  if (c.startsWith('<!') || c.startsWith('<html') || c.startsWith('<div')) return 'html';
  return 'md';
}

function moduleExt(name) {
  return name.endsWith('.css') ? 'css' : 'js';
}

// ── UI Building Blocks ──

function typeBadge(type) {
  return '<span class="bt bt-' + type + '">' + MODE_CONFIG[type].singular.toUpperCase() + '</span>';
}

function hdBar(badge, title, info, actions, showDirty) {
  return '<div class="hd"><div class="hd-left">' + badge
    + '<span class="hd-title">' + esc(title) + '</span>'
    + (info ? '<span class="hd-info">' + info + '</span>' : '')
    + (showDirty ? '<span id="dirtyDot"></span>' : '')
    + '</div><div class="hd-actions">' + (actions || '') + '</div></div>';
}

function codeView(content, lang) {
  return '<div class="code-body"><div class="code-wrap"><pre class="ln">'
    + lineNums(content) + '</pre><pre><code>'
    + (highlight(content, lang) || '(empty)') + '</code></pre></div></div>';
}

function detailRow(label, value) {
  return '<div class="detail-row"><div class="detail-label">' + label + '</div><div class="detail-value">' + value + '</div></div>';
}

function listItem(id, name, meta, active) {
  return '<div class="item' + (active ? ' active' : '') + '" data-id="' + esc(id) + '">'
    + '<div class="item-name">' + esc(name) + '</div>'
    + (meta ? '<div class="item-meta">' + meta + '</div>' : '') + '</div>';
}

function runOutputHtml() {
  if (!lastRun) return '';
  const r = lastRun;
  const cls = r.status === 'running' ? 'running' : r.status === 'completed' ? 'success' : 'error';
  const txt = r.status === 'running' ? 'Running\u2026' : r.status === 'completed' ? 'Completed' : 'Error';
  let body = '';
  if (r.logs && r.logs.length) {
    body = r.logs.map(l => '<div class="' + (l.level === 'error' ? 'log-error' : l.level === 'warning' ? 'log-warn' : '') + '">' + esc(l.message) + '</div>').join('');
  }
  if (r.result != null) body += '<div style="color:var(--color-green-fg);margin-top:4px">\u2192 ' + esc(typeof r.result === 'string' ? r.result : JSON.stringify(r.result, null, 2)) + '</div>';
  if (r.error) body += '<div class="log-error" style="margin-top:4px">Error: ' + esc(r.error) + '</div>';
  return '<div class="run-out"><div class="run-out-hd"><span>Output</span><span class="run-st ' + cls + '">' + txt + '</span></div>'
    + '<div class="run-out-body">' + (body || '<span style="color:var(--color-text1)">(no output)</span>') + '</div></div>';
}

let toastTimer;
function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Mode Config ──
// Modes with `hasSubType: true` have a row-level `type` column (e.g. triggers.type)
// that collides with the UI's mode-type. We preserve the row's type as `selected.subType`.

const MODE_CONFIG = {
  docs: {
    label: 'Docs', singular: 'doc', table: 'docs', creatable: true,
    loadSql: "SELECT name, content, updated_at FROM docs ORDER BY name",
    create: {
      title: 'Create Doc',
      fields: '<label>Name</label><input type="text" id="cName" placeholder="my-doc">',
      buildInsert: (name) => ({
        sql: "INSERT INTO docs (name, content) VALUES (?, ?)",
        params: [name, ''],
      }),
    },
  },
  views: {
    label: 'Views', singular: 'view', table: 'views', creatable: false,
    loadSql: "SELECT name, title, LENGTH(content) as content_length, created_at, updated_at FROM views ORDER BY name",
    lazyContent: true,
  },
  modules: {
    label: 'Modules', singular: 'module', table: 'modules', creatable: true,
    loadSql: "SELECT name, LENGTH(content) as content_length, created_at, updated_at FROM modules ORDER BY name",
    lazyContent: true,
    create: {
      title: 'Create Module',
      fields: '<label>Name</label><input type="text" id="cName" placeholder="my-module.js or my-module.css">',
      buildInsert: (name) => ({
        sql: "INSERT INTO modules (name, content) VALUES (?, ?)",
        params: [name, ''],
      }),
    },
  },
  tasks: {
    label: 'Tasks', singular: 'task', table: 'tasks', creatable: true,
    loadSql: "SELECT name, title, description, content, timeout_ms, created_at, updated_at FROM tasks ORDER BY title",
    create: {
      title: 'Create Task',
      fields: '<label>Name</label><input type="text" id="cName" placeholder="my-task">'
        + '<label>Title</label><input type="text" id="cTitle" placeholder="My Task">'
        + '<label>Description</label><input type="text" id="cDesc" placeholder="Optional">'
        + '<label>Timeout (ms)</label><input type="number" id="cTimeout" value="120000" min="1000" step="1000">',
      buildInsert: (name) => ({
        sql: "INSERT INTO tasks (name, title, description, content, timeout_ms) VALUES (?, ?, ?, ?, ?)",
        params: [name, ($('cTitle').value || '').trim() || name, $('cDesc').value.trim(), '', parseInt($('cTimeout').value) || 120000],
      }),
    },
  },
  triggers: {
    label: 'Triggers', singular: 'trigger', table: 'triggers', creatable: true,
    loadSql: "SELECT t.name, t.task_name, t.type, t.config, t.description, t.enabled, t.created_at, t.updated_at, k.title as task_title FROM triggers t LEFT JOIN tasks k ON t.task_name = k.name ORDER BY t.name",
    hasSubType: true,
  },
  plugins: {
    label: 'Plugins', singular: 'plugin', table: 'plugins', creatable: false,
    loadSql: "SELECT name, description, version, code, enabled, created_at, updated_at FROM plugins ORDER BY name",
  },
  config: {
    label: 'Config', singular: 'config', table: 'config', creatable: true,
    loadSql: "SELECT name AS key, value, description FROM config ORDER BY name",
  },
};

const MODES = Object.keys(MODE_CONFIG);
const DATA = Object.fromEntries(MODES.map(m => [m, []]));

// ── Data Loading & CRUD ──

async function loadAll() {
  const results = await Promise.all(MODES.map(m => agy.runSql({ target: "agent", sql: MODE_CONFIG[m].loadSql })));
  MODES.forEach((m, i) => { DATA[m] = results[i] || []; });
  renderTabs(); updateCreateBtn(); renderList(); refreshSelected();
}

function updateCreateBtn() {
  $('createBtn').style.display = MODE_CONFIG[mode].creatable ? '' : 'none';
}

async function fetchLazyContent(type, name) {
  const rows = await agy.runSql({ target: "agent", sql: "SELECT content FROM " + MODE_CONFIG[type].table + " WHERE name = ?", params: [name] });
  return rows[0] ? rows[0].content : null;
}

async function refreshSelected() {
  if (!selected || selected.type === 'config') return;
  const cfg = MODE_CONFIG[selected.type];
  if (!cfg) return;
  const row = DATA[selected.type].find(i => i.name === selected.name);
  if (!row) { clearContent(); return; }
  const t = selected.type;
  selected = { ...selected, ...row, type: t };
  if (cfg.hasSubType) selected.subType = row.type;
  if (cfg.lazyContent && selected.content == null) {
    const c = await fetchLazyContent(t, selected.name);
    if (c != null) selected.content = c;
  }
  if (!editing) showContent();
}

async function saveItem() {
  const editor = $('editor');
  if (!editor || !selected) return;
  const content = editor.value;
  const cfg = MODE_CONFIG[selected.type];
  if (!cfg) return;
  try {
    await agy.runSql({ target: "agent", sql: "UPDATE " + cfg.table + " SET content = ? WHERE name = ?", params: [content, selected.name], confirmed: true });
    selected.content = content;
    selected.updated_at = Math.floor(Date.now() / 1000);
    const idx = DATA[selected.type].findIndex(i => i.name === selected.name);
    if (idx >= 0) Object.assign(DATA[selected.type][idx], { content, content_length: content.length, updated_at: selected.updated_at });
    dirty = false; editing = false;
    showContent(); renderList(); toast('Saved');
  } catch (err) { toast('Save failed: ' + err.message, 'error'); }
}

async function deleteItem() {
  if (!selected) return;
  const cfg = MODE_CONFIG[selected.type];
  if (!cfg) return;
  if (!confirm('Delete this ' + cfg.singular + ' "' + (selected.title || selected.name) + '"?')) return;
  try {
    await agy.runSql({ target: "agent", sql: "DELETE FROM " + cfg.table + " WHERE name = ?", params: [selected.name], confirmed: true });
    toast('Deleted'); selected = null; editing = false; dirty = false;
    clearContent(); await loadAll();
  } catch (err) { toast('Delete failed: ' + err.message, 'error'); }
}

async function duplicateTask() {
  if (!selected || selected.type !== 'tasks') return;
  try {
    await agy.runSql({ target: "agent",
      sql: "INSERT INTO tasks (name, title, description, content, timeout_ms) VALUES (?, ?, ?, ?, ?)",
      params: [selected.name + '-copy', selected.title + ' (copy)', selected.description || '', selected.content || '', selected.timeout_ms || null],
      confirmed: true });
    toast('Cloned'); await loadAll();
  } catch (err) { toast('Clone failed: ' + err.message, 'error'); }
}

async function runTask() {
  if (!selected || selected.type !== 'tasks') return;
  lastRun = { status: 'running', logs: [], result: null, error: null };
  showContent();
  try {
    const { runId } = await agy.startTask({ taskName: selected.name });
    const result = await agy.waitFor({ topic: 'task:run:' + runId, timeoutMs: selected.timeout_ms || 120000 });
    lastRun = { status: result.status || 'completed', logs: result.logs || [], result: result.result, error: result.error };
  } catch (err) { lastRun = { status: 'error', logs: [], result: null, error: err.message || String(err) }; }
  showContent();
}

async function toggleTrigger() {
  if (!selected || selected.type !== 'triggers') return;
  const on = selected.enabled ? 0 : 1;
  try {
    await agy.runSql({ target: "agent", sql: "UPDATE triggers SET enabled = ? WHERE name = ?", params: [on, selected.name], confirmed: true });
    toast(on ? 'Enabled' : 'Disabled'); await loadAll();
  } catch (err) { toast('Toggle failed: ' + err.message, 'error'); }
}

async function saveTrigger() {
  if (!selected || selected.type !== 'triggers') return;
  const taskName = $('trigTask').value, type = $('trigType').value;
  const desc = $('trigDesc').value.trim(), cfg = $('trigConfig').value.trim();
  try { JSON.parse(cfg); } catch (e) { toast('Invalid JSON', 'error'); return; }
  try {
    await agy.runSql({ target: "agent", sql: "UPDATE triggers SET task_name=?,type=?,description=?,config=? WHERE name=?",
      params: [taskName, type, desc, cfg, selected.name], confirmed: true });
    toast('Saved'); editing = false; dirty = false; await loadAll();
  } catch (err) { toast('Save failed: ' + err.message, 'error'); }
}

async function togglePlugin() {
  if (!selected || selected.type !== 'plugins') return;
  const on = selected.enabled ? 0 : 1;
  try {
    await agy.runSql({ target: "agent", sql: "UPDATE plugins SET enabled = ? WHERE name = ?", params: [on, selected.name], confirmed: true });
    toast(on ? 'Enabled' : 'Disabled'); await loadAll();
  } catch (err) { toast('Toggle failed: ' + err.message, 'error'); }
}

// ── Tabs & List Rendering ──

function renderTabs() {
  $('tabs').innerHTML = MODES.map(m => {
    const cfg = MODE_CONFIG[m];
    return '<button class="tab' + (mode === m ? ' active' : '') + '" data-mode="' + m + '">'
      + cfg.label + ' <span class="cnt">' + DATA[m].length + '</span></button>';
  }).join('');
}

function setMode(m) {
  if (dirty && !confirm('Discard unsaved changes?')) return;
  mode = m; editing = false; dirty = false;
  $('search').value = ''; selected = null; lastRun = null;
  renderTabs(); updateCreateBtn(); renderList();
  if (m === 'config') showConfigOverview(); else clearContent();
}

function renderList() {
  const q = $('search').value.toLowerCase();
  const el = $('list');

  if (mode === 'docs') {
    el.innerHTML = DATA.docs.filter(d => d.name.toLowerCase().includes(q)).map(d =>
      listItem(d.name, d.name,
        '<span>' + fmtSize(d.content ? d.content.length : 0) + '</span><span>' + fmtDate(d.updated_at) + '</span>',
        selected && selected.type === 'docs' && selected.name === d.name)
    ).join('');
  } else if (mode === 'views') {
    el.innerHTML = DATA.views.filter(v => (v.name + ' ' + (v.title || '')).toLowerCase().includes(q)).map(v =>
      listItem(v.name, v.name,
        '<span>' + fmtSize(v.content_length || 0) + '</span><span>' + fmtDate(v.updated_at) + '</span>'
        + (v.title ? '</div><div class="item-meta"><span style="opacity:0.7">' + esc(v.title) + '</span>' : ''),
        selected && selected.type === 'views' && selected.name === v.name)
    ).join('');
  } else if (mode === 'tasks') {
    el.innerHTML = DATA.tasks.filter(t => (t.title + ' ' + (t.description || '')).toLowerCase().includes(q)).map(t =>
      listItem(t.name, t.title,
        '<span>' + fmtSize(t.content ? t.content.length : 0) + '</span><span>' + fmtTimeout(t.timeout_ms) + '</span><span>' + fmtDate(t.updated_at || t.created_at) + '</span>',
        selected && selected.type === 'tasks' && selected.name === t.name)
    ).join('');
  } else if (mode === 'triggers') {
    el.innerHTML = DATA.triggers.filter(t => ((t.description || '') + ' ' + (t.task_title || '') + ' ' + t.type + ' ' + (t.config || '')).toLowerCase().includes(q)).map(t => {
      const label = t.description || (t.type + ' \u2192 ' + (t.task_title || t.task_name));
      let hint = '';
      try {
        const cfg = JSON.parse(t.config || '{}');
        if (t.type === 'schedule') hint = cfg.expression || '';
        else if (t.type === 'http') hint = (cfg.method || 'POST') + ' ' + (cfg.path || '');
        else if (t.type === 'event') hint = cfg.topic || '';
      } catch (e) {}
      return listItem(t.name, label,
        '<span class="st st-' + t.type + '">' + esc(t.type) + '</span>'
        + '<span class="st ' + (t.enabled ? 'st-on' : 'st-off') + '">' + (t.enabled ? 'on' : 'off') + '</span>'
        + (hint ? '<span style="opacity:0.6;font-family:var(--font-mono);font-size:10px">' + esc(hint) + '</span>' : ''),
        selected && selected.type === 'triggers' && selected.name === t.name);
    }).join('');
  } else if (mode === 'modules') {
    el.innerHTML = DATA.modules.filter(m => m.name.toLowerCase().includes(q)).map(m =>
      listItem(m.name, m.name,
        '<span style="text-transform:uppercase;opacity:0.7">' + esc(moduleExt(m.name)) + '</span>'
        + '<span>' + fmtSize(m.content_length || 0) + '</span>'
        + '<span>' + fmtDate(m.updated_at) + '</span>',
        selected && selected.type === 'modules' && selected.name === m.name)
    ).join('');
  } else if (mode === 'plugins') {
    el.innerHTML = DATA.plugins.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)).map(p =>
      listItem(p.name, p.name,
        '<span class="st ' + (p.enabled ? 'st-on' : 'st-off') + '">' + (p.enabled ? 'on' : 'off') + '</span>'
        + '<span>v' + esc(p.version) + '</span><span>' + fmtDate(p.updated_at) + '</span>',
        selected && selected.type === 'plugins' && selected.name === p.name)
    ).join('');
  } else if (mode === 'config') {
    el.innerHTML = DATA.config.filter(c => c.key.toLowerCase().includes(q) || (c.value || '').toLowerCase().includes(q)).map(c =>
      listItem(c.key, c.key,
        '<span style="font-family:var(--font-mono);opacity:0.6">' + esc(String(c.value).substring(0, 40)) + '</span>',
        selected && selected.type === 'config' && selected.key === c.key)
    ).join('');
  }
}

// ── Content Rendering ──

async function selectItem(type, id) {
  if (dirty && !confirm('Discard unsaved changes?')) return;
  if (type === 'config') { selectConfigItem(id); return; }
  const cfg = MODE_CONFIG[type];
  if (!cfg) return;
  const item = DATA[type].find(i => i.name === id);
  if (!item) return;
  selected = { ...item, type };
  if (cfg.hasSubType) selected.subType = item.type;
  if (cfg.lazyContent && selected.content == null) {
    const c = await fetchLazyContent(type, id);
    if (c != null) selected.content = c;
  }
  editing = false; dirty = false; lastRun = null;
  showContent(); renderList();
}

function showContent() {
  if (!selected) { clearContent(); return; }
  if (selected.type === 'triggers') { showTriggerContent(); return; }
  if (selected.type === 'plugins') { showPluginContent(); return; }
  if (selected.type === 'config') { showConfigContent(); return; }

  const s = selected;
  const badge = typeBadge(s.type);
  const name = s.title || s.name;
  const size = fmtSize(s.content ? s.content.length : 0);
  const lines = (s.content || '').split('\n').length;
  let info = size + ' \u00b7 ' + lines + ' lines';
  if (s.type === 'views' && s.title) info = s.name + ' \u00b7 ' + info;
  if (s.type === 'tasks' && s.timeout_ms) info += ' \u00b7 ' + fmtTimeout(s.timeout_ms);
  if (s.type === 'modules') info = moduleExt(s.name).toUpperCase() + ' \u00b7 ' + info;
  const ts = s.updated_at || s.created_at;
  if (ts) info += ' \u00b7 ' + fmtDate(ts);

  if (editing) {
    const actions = '<button class="btn" onclick="cancelEdit()">' + IC.x + ' Cancel</button>'
      + '<button class="btn btn-primary" onclick="saveItem()">' + IC.save + ' Save</button>';
    $('content').innerHTML = hdBar(badge, name, '', actions, true)
      + '<div class="editor-body"><textarea id="editor" spellcheck="false">' + esc(s.content || '') + '</textarea></div>'
      + runOutputHtml();
    const ed = $('editor');
    ed.addEventListener('input', () => { dirty = true; updateDirty(); });
    ed.addEventListener('keydown', editorKeys);
    ed.focus(); updateDirty();
  } else {
    let actions = '<button class="btn" onclick="startEdit()">' + IC.edit + ' Edit</button>';
    if (s.type === 'tasks') {
      actions = '<button class="btn btn-green" onclick="runTask()">' + IC.play + ' Run</button>'
        + '<button class="btn" onclick="duplicateTask()">' + IC.copy + '</button>'
        + '<button class="btn btn-danger" onclick="deleteItem()">' + IC.trash + '</button>' + actions;
    } else if (s.type === 'docs' || s.type === 'modules') {
      actions = '<button class="btn btn-danger" onclick="deleteItem()">' + IC.trash + '</button>' + actions;
    }
    let desc = '';
    if (s.type === 'tasks' && s.description) desc = '<div class="desc-bar">' + esc(s.description) + '</div>';
    $('content').innerHTML = hdBar(badge, name, info, actions, false) + desc
      + codeView(s.content || '', detectLang(s)) + runOutputHtml();
  }
}

function showTriggerContent() {
  const s = selected;
  const badge = typeBadge('triggers');
  const title = s.description || (s.subType + ' \u2192 ' + (s.task_title || s.task_name));

  if (editing) {
    let cfgPretty = s.config || '{}';
    try { cfgPretty = JSON.stringify(JSON.parse(cfgPretty), null, 2); } catch (e) {}
    const taskOpts = DATA.tasks.map(t => '<option value="' + esc(t.name) + '"' + (t.name === s.task_name ? ' selected' : '') + '>' + esc(t.title) + '</option>').join('');
    const actions = '<button class="btn" onclick="cancelEdit()">' + IC.x + ' Cancel</button>'
      + '<button class="btn btn-primary" onclick="saveTrigger()">' + IC.save + ' Save</button>';
    $('content').innerHTML = hdBar(badge, title, '', actions, true)
      + '<div class="code-body"><div class="detail">'
      + detailRow('Task', '<select id="trigTask">' + taskOpts + '</select>')
      + detailRow('Type', '<select id="trigType"><option value="schedule"' + (s.subType === 'schedule' ? ' selected' : '') + '>schedule</option><option value="http"' + (s.subType === 'http' ? ' selected' : '') + '>http</option><option value="event"' + (s.subType === 'event' ? ' selected' : '') + '>event</option></select>')
      + detailRow('Description', '<input type="text" id="trigDesc" value="' + esc(s.description || '') + '" placeholder="Optional">')
      + detailRow('Config', '<textarea id="trigConfig" rows="5">' + esc(cfgPretty) + '</textarea>')
      + '</div></div>';
    document.querySelectorAll('#trigTask,#trigType,#trigDesc,#trigConfig').forEach(el => {
      el.addEventListener('input', () => { dirty = true; updateDirty(); });
      el.addEventListener('change', () => { dirty = true; updateDirty(); });
    });
    updateDirty();
  } else {
    let cfgPretty = s.config || '{}';
    try { cfgPretty = JSON.stringify(JSON.parse(cfgPretty), null, 2); } catch (e) {}
    const info = fmtDate(s.updated_at || s.created_at);
    const actions = '<button class="btn' + (s.enabled ? '' : ' btn-green') + '" onclick="toggleTrigger()">'
      + (s.enabled ? IC.x + ' Disable' : IC.play + ' Enable') + '</button>'
      + '<button class="btn" onclick="startEdit()">' + IC.edit + ' Edit</button>'
      + '<button class="btn btn-danger" onclick="deleteItem()">' + IC.trash + '</button>';
    $('content').innerHTML = hdBar(badge, title, info, actions, false)
      + '<div class="code-body"><div class="detail">'
      + detailRow('Name', esc(s.name))
      + detailRow('Type', '<span class="st st-' + s.subType + '">' + esc(s.subType) + '</span>')
      + detailRow('Status', '<span class="st ' + (s.enabled ? 'st-on' : 'st-off') + '">' + (s.enabled ? 'Enabled' : 'Disabled') + '</span>')
      + detailRow('Task', esc(s.task_title || '(unknown)') + ' <span style="opacity:0.5">(' + esc(s.task_name) + ')</span>')
      + (s.description ? detailRow('Description', esc(s.description)) : '')
      + detailRow('Config', '<div class="detail-block">' + esc(cfgPretty) + '</div>')
      + '</div></div>';
  }
}

function showPluginContent() {
  const s = selected;
  const badge = typeBadge('plugins');
  const code = s.code || '';
  const info = 'v' + esc(s.version) + ' \u00b7 ' + fmtSize(code.length) + ' \u00b7 ' + fmtDate(s.updated_at);
  const docName = 'plugin.' + s.name;
  const hasDoc = DATA.docs.some(d => d.name === docName);
  let actions = '';
  if (hasDoc) actions += '<button class="btn" onclick="setMode(\'docs\');setTimeout(()=>selectItem(\'docs\',\'' + esc(docName) + '\'),50)">' + IC.edit + ' Docs</button>';
  actions += '<button class="btn' + (s.enabled ? '' : ' btn-green') + '" onclick="togglePlugin()">'
    + (s.enabled ? IC.x + ' Disable' : IC.play + ' Enable') + '</button>';
  $('content').innerHTML = hdBar(badge, s.name, info, actions, false)
    + '<div class="plugin-info">'
    + '<span class="st ' + (s.enabled ? 'st-on' : 'st-off') + '">' + (s.enabled ? 'Enabled' : 'Disabled') + '</span>'
    + (s.description ? '<span style="font-size:12px;color:var(--color-text2)">' + esc(s.description) + '</span>' : '')
    + '</div>' + codeView(code, 'js');
}

// ── Editor Helpers ──

function editorKeys(e) {
  const ed = $('editor');
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveItem(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ed.selectionStart, end = ed.selectionEnd;
    ed.value = ed.value.substring(0, s) + '  ' + ed.value.substring(end);
    ed.selectionStart = ed.selectionEnd = s + 2;
    dirty = true; updateDirty();
  }
  if (e.key === 'Escape') cancelEdit();
}

function updateDirty() {
  const d = $('dirtyDot');
  if (d) d.innerHTML = dirty ? '<span class="dirty"></span>' : '';
}
function startEdit() { editing = true; dirty = false; showContent(); }
function cancelEdit() {
  if (dirty && !confirm('Discard unsaved changes?')) return;
  editing = false; dirty = false; showContent();
}
function clearContent() {
  selected = null; editing = false; dirty = false;
  $('content').innerHTML = '<div class="empty">Select an item to inspect</div>';
}

// ── Config ──

const CONFIG_REF = [
  { key: 'backup.interval-hours', type: 'number', def: '24', range: '1\u20138760', desc: 'Auto backup interval (hours)' },
  { key: 'backup.max-count', type: 'number', def: '5', range: '1\u2013100', desc: 'Max backups to keep' },
  { key: 'cleanup.session-retention-days', type: 'number', def: '30', range: '0\u20133650', desc: 'Delete old sessions (0=keep forever)' },
  { key: 'cleanup.task-log-retention-days', type: 'number', def: '30', range: '0\u20133650', desc: 'Delete old task logs (0=keep forever)' },
  { key: 'http-api.port', type: 'number', def: '9877', range: '1\u201365535', desc: 'HTTP API port (restart required)' },
];

function selectConfigItem(key) {
  if (dirty && !confirm('Discard unsaved changes?')) return;
  const item = DATA.config.find(c => c.key === key);
  if (!item) return;
  selected = { type: 'config', key: item.key, value: item.value, description: item.description };
  editing = false; dirty = false;
  showConfigContent(); renderList();
}

function showConfigContent() {
  if (!selected || selected.type !== 'config') { showConfigOverview(); return; }
  const s = selected;
  const badge = typeBadge('config');
  const ref = CONFIG_REF.find(r => r.key === s.key);

  if (editing) {
    const actions = '<button class="btn" onclick="cancelConfigEdit()">' + IC.x + ' Cancel</button>'
      + '<button class="btn btn-primary" onclick="saveConfigKey()">' + IC.save + ' Save</button>';
    const refInfo = ref
      ? '<div style="margin-top:12px;font-size:11px;color:var(--color-text1)">Type: <code style="font-family:var(--font-mono);font-size:11px;background:var(--color-bg3);padding:1px 5px;border-radius:3px">' + ref.type + '</code> \u00b7 Default: <code style="font-family:var(--font-mono);font-size:11px;background:var(--color-bg3);padding:1px 5px;border-radius:3px">' + ref.def + '</code>' + (ref.range ? ' \u00b7 Range: ' + ref.range : '') + '<br>' + esc(ref.desc) + '</div>'
      : '';
    $('content').innerHTML = hdBar(badge, s.key, '', actions, true)
      + '<div class="code-body"><div class="detail" style="max-width:500px">'
      + '<label style="font-size:11px;font-weight:600;color:var(--color-text2);margin-bottom:6px;display:block">Value</label>'
      + '<input type="text" id="cfgValue" class="cfg-edit-input" value="' + esc(s.value || '') + '">'
      + refInfo + '</div></div>';
    setTimeout(() => {
      const inp = $('cfgValue');
      if (inp) {
        inp.addEventListener('input', () => { dirty = true; updateDirty(); });
        inp.focus(); inp.select();
      }
    }, 50);
    updateDirty();
  } else {
    const actions = '<button class="btn" onclick="editing=true;dirty=false;showConfigContent()">' + IC.edit + ' Edit</button>'
      + '<button class="btn btn-danger" onclick="deleteConfigKey(\'' + esc(s.key).replace(/'/g, "\\'") + '\')">' + IC.trash + '</button>';
    $('content').innerHTML = hdBar(badge, s.key, '', actions, false)
      + '<div class="code-body"><div class="detail" style="max-width:600px">'
      + '<div style="margin-bottom:16px">'
      + '<div style="font-size:11px;font-weight:600;color:var(--color-text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Value</div>'
      + '<div class="cfg-value-display">' + esc(s.value || '(empty)') + '</div>'
      + (s.description ? '<div style="margin-top:8px;font-size:12px;color:var(--color-text2)">' + esc(s.description) + '</div>' : '')
      + '</div>'
      + (ref ? '<div class="info-box"><strong>' + esc(ref.desc) + '</strong><br>Type: <code>' + ref.type + '</code> \u00b7 Default: <code>' + ref.def + '</code>' + (ref.range ? ' \u00b7 Range: ' + ref.range : '') + '</div>' : '<div class="info-box">Custom config key.</div>')
      + '</div></div>';
  }
}

function showConfigOverview() {
  const badge = typeBadge('config');
  let rows = '';
  if (DATA.config.length === 0) {
    rows = '<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--color-text1)">No config keys set. Using defaults.</td></tr>';
  } else {
    rows = DATA.config.map(c =>
      '<tr><td class="cfg-key">' + esc(c.key) + '</td><td class="cfg-val">' + esc(c.value) + '</td>'
      + '<td class="cfg-actions"><button onclick="selectConfigItem(\'' + esc(c.key).replace(/'/g, "\\'") + '\')">' + IC.edit + '</button>'
      + '<button class="del" onclick="deleteConfigKey(\'' + esc(c.key).replace(/'/g, "\\'") + '\')">' + IC.trash + '</button></td></tr>'
    ).join('');
  }
  $('content').innerHTML = hdBar(badge, 'Agent Configuration', '', '', false)
    + '<div class="code-body" style="padding:16px"><table class="cfg-table"><thead><tr><th>Key</th><th>Value</th><th style="width:70px"></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function cancelConfigEdit() {
  if (dirty && !confirm('Discard changes?')) return;
  editing = false; dirty = false; showConfigContent();
}

async function saveConfigKey() {
  const inp = $('cfgValue');
  if (!inp || !selected) return;
  const val = inp.value;
  try {
    await agy.runSql({ target: "agent", sql: "INSERT OR REPLACE INTO config (name, value) VALUES (?, ?)", params: [selected.key, val], confirmed: true });
    selected.value = val;
    const idx = DATA.config.findIndex(c => c.key === selected.key);
    if (idx >= 0) DATA.config[idx].value = val;
    else { DATA.config.push({ key: selected.key, value: val }); DATA.config.sort((a, b) => a.key.localeCompare(b.key)); }
    dirty = false; editing = false;
    showConfigContent(); renderTabs(); renderList(); toast('Saved');
  } catch (err) { toast('Save failed: ' + err.message, 'error'); }
}

async function deleteConfigKey(key) {
  if (!confirm('Delete "' + key + '"? Setting will revert to default.')) return;
  try {
    await agy.runSql({ target: "agent", sql: "DELETE FROM config WHERE name = ?", params: [key], confirmed: true });
    DATA.config = DATA.config.filter(c => c.key !== key);
    if (selected && selected.type === 'config' && selected.key === key) { selected = null; editing = false; dirty = false; }
    toast('Deleted'); renderTabs(); renderList();
    if (mode === 'config' && !selected) showConfigOverview();
    else if (selected) showConfigContent();
  } catch (err) { toast('Delete failed: ' + err.message, 'error'); }
}

// ── Modals ──

function closeModal() { $('modal').innerHTML = ''; }

function showCreateModal() {
  if (mode === 'config') { showCreateConfigModal(); return; }
  if (mode === 'triggers') { showCreateTriggerModal(); return; }
  const create = MODE_CONFIG[mode].create;
  if (!create) return;
  $('modal').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    + '<div class="modal"><h3>' + create.title + '</h3>' + create.fields
    + '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="doCreate()">Create</button></div></div></div>';
  setTimeout(() => $('cName').focus(), 50);
}

async function doCreate() {
  const name = $('cName').value.trim();
  if (!name) { toast('Name required', 'error'); return; }
  const cfg = MODE_CONFIG[mode];
  const create = cfg && cfg.create;
  if (!create) return;
  try {
    const ins = create.buildInsert(name);
    await agy.runSql({ target: "agent", sql: ins.sql, params: ins.params, confirmed: true });
    closeModal(); toast('Created'); await loadAll();
    const created = DATA[mode].find(i => i.name === name);
    if (created) {
      selected = { ...created, type: mode };
      if (cfg.hasSubType) selected.subType = created.type;
      editing = true; dirty = false; showContent(); renderList();
    }
  } catch (err) { toast('Create failed: ' + err.message, 'error'); }
}

function showCreateTriggerModal() {
  const taskOpts = DATA.tasks.map(t => '<option value="' + esc(t.name) + '">' + esc(t.title) + '</option>').join('');
  $('modal').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    + '<div class="modal"><h3>Create Trigger</h3>'
    + '<label>Name</label><input type="text" id="cTrigName" placeholder="my-trigger">'
    + '<label>Task</label><select id="cTrigTask">' + taskOpts + '</select>'
    + '<label>Type</label><select id="cTrigType"><option value="schedule">schedule</option><option value="http">http</option><option value="event">event</option></select>'
    + '<label>Description</label><input type="text" id="cTrigDesc" placeholder="Optional">'
    + '<label>Config (JSON)</label><textarea id="cTrigConfig" rows="3">{}</textarea>'
    + '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="doCreateTrigger()">Create</button></div></div></div>';
  setTimeout(() => $('cTrigName').focus(), 50);
}

async function doCreateTrigger() {
  const name = $('cTrigName').value.trim(), task = $('cTrigTask').value, type = $('cTrigType').value;
  const desc = $('cTrigDesc').value.trim(), cfg = $('cTrigConfig').value.trim();
  if (!name) { toast('Name required', 'error'); return; }
  if (!task) { toast('Select a task', 'error'); return; }
  try { JSON.parse(cfg); } catch (e) { toast('Invalid JSON', 'error'); return; }
  try {
    await agy.runSql({ target: "agent",
      sql: "INSERT INTO triggers (name, task_name, type, config, description, enabled) VALUES (?, ?, ?, ?, ?, 1)",
      params: [name, task, type, cfg, desc], confirmed: true });
    closeModal(); toast('Created'); await loadAll();
    const created = DATA.triggers.find(t => t.name === name);
    if (created) { selected = { ...created, type: 'triggers', subType: created.type }; showContent(); renderList(); }
  } catch (err) { toast('Create failed: ' + err.message, 'error'); }
}

function showCreateConfigModal() {
  const existing = new Set(DATA.config.map(c => c.key));
  const presetOpts = CONFIG_REF.filter(r => !existing.has(r.key))
    .map(r => '<option value="' + esc(r.key) + '">' + esc(r.key) + ' \u2014 ' + esc(r.desc) + '</option>').join('');
  $('modal').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    + '<div class="modal"><h3>Add Config Key</h3>'
    + (presetOpts ? '<label>Preset</label><select id="cfgPreset" onchange="applyPreset()">'
      + '<option value="">Custom\u2026</option>' + presetOpts + '</select>' : '')
    + '<label>Key</label><input type="text" id="cCfgKey" placeholder="setting.name">'
    + '<label>Value</label><input type="text" id="cCfgVal" placeholder="value">'
    + '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="doCreateConfig()">Save</button></div></div></div>';
  setTimeout(() => $('cCfgKey').focus(), 50);
}

function applyPreset() {
  const val = $('cfgPreset').value;
  $('cCfgKey').value = val;
  const ref = CONFIG_REF.find(r => r.key === val);
  if (ref) $('cCfgVal').value = ref.def;
  $('cCfgVal').focus();
}

async function doCreateConfig() {
  const key = $('cCfgKey').value.trim(), val = $('cCfgVal').value;
  if (!key) { toast('Key required', 'error'); return; }
  try {
    await agy.runSql({ target: "agent", sql: "INSERT OR REPLACE INTO config (name, value) VALUES (?, ?)", params: [key, val], confirmed: true });
    closeModal(); toast('Added'); await loadAll();
    selected = { type: 'config', key, value: val };
    editing = false; dirty = false;
    showConfigContent(); renderList();
  } catch (err) { toast('Create failed: ' + err.message, 'error'); }
}

// ── Init ──

$('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (t) setMode(t.dataset.mode);
});
$('list').addEventListener('click', e => {
  const el = e.target.closest('.item');
  if (el) selectItem(mode, el.dataset.id);
});
loadAll();
</script>
</body>
</html>

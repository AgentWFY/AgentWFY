<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Source Explorer</title>
  <!--
    SECTIONS:
    style-layout      – page shell: header, sidebar, container, mode tabs
    style-components  – list items, badges, buttons, type labels, content area
    style-editor      – code viewer, editor, line numbers, syntax highlighting, run output
    style-modals      – modal overlay, toast, config tables, trigger detail
    script-highlight  – syntax highlighting: HTML, JS, CSS, Markdown
    script-data       – state, data loading, CRUD operations, task runner
    script-render     – sidebar list rendering, content display, mode switching
    script-config     – config tab: overview, editing, create modal, reference table
    script-init       – event wiring and startup
  -->
<style id="style-layout">
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-family);
    background: var(--color-bg1);
    color: var(--color-text3);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  svg.icon {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    vertical-align: -2px;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-bg2);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px; font-weight: 600; margin: 0;
    display: flex; align-items: center; gap: 8px;
  }
  header .header-actions { display: flex; gap: 6px; }
  .container { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 280px; min-width: 280px;
    border-right: 1px solid var(--color-border);
    background: var(--color-bg2);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .mode-tabs {
    display: flex; gap: 2px;
    align-items: center;
  }
  .mode-tab {
    padding: 6px 12px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; background: none;
    color: var(--color-text2);
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-family);
    white-space: nowrap;
  }
  .mode-tab:hover { color: var(--color-text3); background: var(--color-item-hover); }
  .mode-tab.active { color: var(--color-accent); background: color-mix(in srgb, var(--color-accent) 10%, transparent); }
  .mode-tab .tab-count {
    font-size: 10px; font-weight: 600;
    background: var(--color-bg3); color: var(--color-text1);
    padding: 1px 6px; border-radius: 8px;
  }
  .mode-tab.active .tab-count {
    background: color-mix(in srgb, var(--color-accent) 20%, transparent);
    color: var(--color-accent);
  }
  .sidebar .search-box {
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-divider);
    flex-shrink: 0;
    display: flex; gap: 6px;
  }
  .sidebar input[type="text"] {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-md);
    background: var(--color-input-bg); color: var(--color-text3);
    font-size: 12px; font-family: var(--font-family);
    outline: none; transition: border var(--transition-fast);
    flex: 1; min-width: 0;
  }
  .sidebar input[type="text"]:focus { border-color: var(--color-focus-border); }
  .sidebar input::placeholder { color: var(--color-placeholder); }
</style>
<style id="style-components">
  .item-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .list-item {
    padding: 9px 14px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background var(--transition-fast);
  }
  .list-item:hover { background: var(--color-item-hover); }
  .list-item.active { background: var(--color-surface); border-left-color: var(--color-accent); }
  .list-item .item-name {
    font-size: 12px; font-weight: 500;
    font-family: var(--font-mono); word-break: break-all; line-height: 1.4;
  }
  .list-item .item-meta {
    font-size: 11px; color: var(--color-text1);
    margin-top: 3px; display: flex; gap: 8px; align-items: center;
  }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .badge.task-badge { background: color-mix(in srgb, var(--color-accent) 12%, transparent); color: var(--color-accent); }
  .badge.timeout-badge { background: var(--color-bg3); color: var(--color-text1); }
  .badge.trigger-schedule { background: color-mix(in srgb, #61afef 15%, transparent); color: #61afef; }
  .badge.trigger-http { background: color-mix(in srgb, var(--color-green-fg) 15%, transparent); color: var(--color-green-fg); }
  .badge.trigger-event { background: color-mix(in srgb, #d19a66 15%, transparent); color: #d19a66; }
  .badge.trigger-enabled { background: var(--color-green-bg); color: var(--color-green-fg); }
  .badge.trigger-disabled { background: color-mix(in srgb, var(--color-red-fg) 15%, transparent); color: var(--color-red-fg); }
  .badge.plugin-enabled { background: var(--color-green-bg); color: var(--color-green-fg); }
  .badge.plugin-disabled { background: color-mix(in srgb, var(--color-red-fg) 15%, transparent); color: var(--color-red-fg); }
  .badge.version-badge { background: var(--color-bg3); color: var(--color-text1); }

  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--color-divider);
    flex-shrink: 0; background: var(--color-bg1); gap: 12px;
  }
  .content-header .left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .content-header .type-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
  }
  .type-label.doc-label { background: var(--color-yellow-bg); color: var(--color-yellow-fg); }
  .type-label.view-label { background: color-mix(in srgb, var(--color-accent) 15%, transparent); color: var(--color-accent); }
  .type-label.task-label { background: color-mix(in srgb, var(--color-green-fg) 15%, transparent); color: var(--color-green-fg); }
  .type-label.plugin-label { background: color-mix(in srgb, #c678dd 15%, transparent); color: #c678dd; }
  .type-label.trigger-label { background: color-mix(in srgb, #61afef 15%, transparent); color: #61afef; }
  .content-header .title {
    font-size: 13px; font-weight: 600; font-family: var(--font-mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .content-header .info { font-size: 11px; color: var(--color-text1); white-space: nowrap; }
  .content-header .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .content-body { flex: 1; overflow: auto; padding: 16px 20px; }
  .content-body pre {
    margin: 0; font-family: var(--font-mono);
    font-size: 12px; line-height: 1.65;
    white-space: pre;
    color: var(--color-text3); tab-size: 2;
  }
  .content-body code { font-family: var(--font-mono); font-size: 12px; line-height: 1.65; }
  .content-body textarea {
    width: 100%; height: 100%; resize: none;
    border: none; outline: none;
    background: transparent; color: var(--color-text3);
    font-family: var(--font-mono); font-size: 12px;
    line-height: 1.65; padding: 0; tab-size: 2;
  }
  .content-body.editing { display: flex; }
  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--color-text1); font-size: 13px;
    flex-direction: column; gap: 8px;
  }
  .empty-state svg.icon { width: 32px; height: 32px; opacity: 0.3; }

  .btn {
    border: 1px solid var(--color-border);
    padding: 5px 12px; border-radius: var(--radius-md);
    cursor: pointer; font-size: 11px; font-family: var(--font-family);
    transition: all var(--transition-fast);
    display: inline-flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .btn-default { background: var(--color-bg3); color: var(--color-text2); }
  .btn-default:hover { background: var(--color-item-hover); color: var(--color-text3); }
  .btn-primary { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
  .btn-primary:hover { background: var(--color-accent-hover); }
  .btn-green { background: var(--color-green-fg); border-color: var(--color-green-fg); color: #fff; }
  .btn-green:hover { opacity: 0.85; }
  .btn-danger { background: var(--color-red-fg); border-color: var(--color-red-fg); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-add {
    padding: 5px 8px; border-radius: var(--radius-md); flex-shrink: 0;
    border: 1px solid var(--color-border);
    background: var(--color-bg3); color: var(--color-text2);
    cursor: pointer; font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
    font-family: var(--font-family);
  }
  .btn-add:hover { background: var(--color-item-hover); color: var(--color-accent); border-color: var(--color-accent); }

  .dirty-dot { display: inline-block; width: 8px; height: 8px; background: var(--color-accent); border-radius: 50%; }
</style>
<style id="style-editor">
  .code-wrap { display: flex; gap: 0; min-width: max-content; }
  .line-nums {
    text-align: right; padding-right: 14px;
    color: var(--color-text1); font-family: var(--font-mono);
    font-size: 12px; line-height: 1.65;
    user-select: none; opacity: 0.5;
    border-right: 1px solid var(--color-divider);
    margin-right: 14px; flex-shrink: 0;
    position: sticky; left: 0;
    background: var(--color-bg1); z-index: 1;
  }

  /* Run output panel */
  .run-output {
    border-top: 1px solid var(--color-divider);
    max-height: 200px; overflow-y: auto;
    background: var(--color-bg2);
    flex-shrink: 0;
  }
  .run-output-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px;
    border-bottom: 1px solid var(--color-divider);
    font-size: 11px; font-weight: 600; color: var(--color-text2);
  }
  .run-output-body {
    padding: 8px 16px;
    font-family: var(--font-mono); font-size: 11px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    color: var(--color-text3);
  }
  .run-output-body .log-line { padding: 1px 0; }
  .run-output-body .log-error { color: var(--color-red-fg); }
  .run-output-body .log-warn { color: var(--color-yellow-fg); }
  .run-status { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
  .run-status.running  { background: color-mix(in srgb, var(--color-accent) 15%, transparent); color: var(--color-accent); }
  .run-status.success  { background: var(--color-green-bg); color: var(--color-green-fg); }
  .run-status.error    { background: color-mix(in srgb, var(--color-red-fg) 15%, transparent); color: var(--color-red-fg); }

  /* Syntax highlighting */
  .hl-tag   { color: #e06c75; }
  .hl-attr  { color: #d19a66; }
  .hl-aval  { color: #98c379; }
  .hl-str   { color: #98c379; }
  .hl-kw    { color: #c678dd; }
  .hl-num   { color: #d19a66; }
  .hl-cmt   { color: #5c6370; font-style: italic; }
  .hl-fn    { color: #61afef; }
  .hl-prop  { color: #e06c75; }
  .hl-val   { color: #d19a66; }
  .hl-sel   { color: #e5c07b; }
  .hl-punct { color: #abb2bf; }
  .hl-ent   { color: #56b6c2; }
  .hl-doctype { color: #5c6370; }

  @media (prefers-color-scheme: light) {
    .hl-tag   { color: #be3631; }
    .hl-attr  { color: #9a6600; }
    .hl-aval  { color: #50852a; }
    .hl-str   { color: #50852a; }
    .hl-kw    { color: #a626a4; }
    .hl-num   { color: #986801; }
    .hl-cmt   { color: #a0a1a7; font-style: italic; }
    .hl-fn    { color: #4078f2; }
    .hl-prop  { color: #be3631; }
    .hl-val   { color: #986801; }
    .hl-sel   { color: #c18401; }
    .hl-punct { color: #383a42; }
    .hl-ent   { color: #0184bc; }
    .hl-doctype { color: #a0a1a7; }
  }
</style>
<style id="style-modals">
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    padding: 10px 18px; border-radius: var(--radius-md);
    font-size: 12px; color: #fff; z-index: 999;
    opacity: 0; transform: translateY(8px);
    transition: all 0.25s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--color-green-fg); }
  .toast.error   { background: var(--color-red-fg); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--color-bg1);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg, 10px);
    padding: 20px 24px; width: 420px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .modal label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--color-text2); margin-bottom: 4px; margin-top: 12px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type="text"], .modal input[type="number"] {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-md);
    background: var(--color-input-bg); color: var(--color-text3);
    font-size: 12px; font-family: var(--font-family);
    outline: none;
  }
  .modal input:focus { border-color: var(--color-focus-border); }
  .modal .modal-actions {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
  }

  /* Config tab styles */
  .config-table { width: 100%; border-collapse: collapse; }
  .config-table th {
    text-align: left; font-size: 11px; font-weight: 600; color: var(--color-text2);
    text-transform: uppercase; letter-spacing: 0.3px;
    padding: 8px 14px; border-bottom: 2px solid var(--color-divider);
    position: sticky; top: 0; background: var(--color-bg1); z-index: 1;
  }
  .config-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--color-divider);
    font-size: 12px; vertical-align: top;
  }
  .config-table tr:hover td { background: var(--color-item-hover); }
  .config-table .key-cell { font-family: var(--font-mono); font-weight: 500; white-space: nowrap; color: var(--color-accent); }
  .config-table .val-cell { font-family: var(--font-mono); word-break: break-all; color: var(--color-text3); }
  .config-table .actions-cell { white-space: nowrap; text-align: right; }
  .config-table .actions-cell button {
    background: none; border: none; cursor: pointer; padding: 2px 6px;
    color: var(--color-text1); transition: color var(--transition-fast);
  }
  .config-table .actions-cell button:hover { color: var(--color-text3); }
  .config-table .actions-cell button.del:hover { color: var(--color-red-fg); }
  .config-empty { text-align: center; padding: 40px 20px; color: var(--color-text1); font-size: 13px; }
  .config-info-box {
    margin: 16px 0; padding: 12px 16px;
    background: color-mix(in srgb, var(--color-accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--color-accent) 20%, transparent);
    border-radius: var(--radius-md); font-size: 12px; color: var(--color-text2);
    line-height: 1.6;
  }
  .config-info-box code {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--color-bg3); padding: 1px 5px; border-radius: 3px;
  }
  .config-ref-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .config-ref-table th {
    text-align: left; font-size: 10px; font-weight: 600; color: var(--color-text2);
    text-transform: uppercase; letter-spacing: 0.3px;
    padding: 6px 10px; border-bottom: 1px solid var(--color-divider);
  }
  .config-ref-table td {
    padding: 6px 10px; border-bottom: 1px solid var(--color-divider);
    font-size: 11px; color: var(--color-text2);
  }
  .config-ref-table td:first-child { font-family: var(--font-mono); color: var(--color-text3); white-space: nowrap; }
  .config-ref-table code { font-family: var(--font-mono); font-size: 11px; }

  /* Trigger detail */
  .trigger-detail .detail-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: baseline; }
  .trigger-detail .detail-label { font-size: 11px; font-weight: 600; color: var(--color-text1); min-width: 90px; text-transform: uppercase; letter-spacing: 0.3px; }
  .trigger-detail .detail-value { font-size: 13px; font-family: var(--font-mono); color: var(--color-text3); word-break: break-all; }
  .trigger-detail .config-block { background: var(--color-bg2); border: 1px solid var(--color-divider); border-radius: var(--radius-md); padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; white-space: pre-wrap; color: var(--color-text3); }
</style>
</head>
<body>

<header>
  <h1>
    <svg class="icon" style="width:17px;height:17px" viewBox="0 0 24 24"><path d="M16 18l2-2v-7l-5-5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"/><polyline points="13 4 13 9 18 9"/><path d="M18 22l4-4-4-4"/><path d="M22 18h-8"/></svg>
    Source Explorer
  </h1>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="docs" onclick="setMode('docs')">
      Docs <span class="tab-count" id="docsCount">0</span>
    </button>
    <button class="mode-tab" data-mode="views" onclick="setMode('views')">
      Views <span class="tab-count" id="viewsCount">0</span>
    </button>
    <button class="mode-tab" data-mode="tasks" onclick="setMode('tasks')">
      Tasks <span class="tab-count" id="tasksCount">0</span>
    </button>
    <button class="mode-tab" data-mode="triggers" onclick="setMode('triggers')">
      Triggers <span class="tab-count" id="triggersCount">0</span>
    </button>
    <button class="mode-tab" data-mode="plugins" onclick="setMode('plugins')">
      Plugins <span class="tab-count" id="pluginsCount">0</span>
    </button>
    <button class="mode-tab" data-mode="config" onclick="setMode('config')">
      Config <span class="tab-count" id="configCount">0</span>
    </button>
  </div>
  <div class="header-actions">
    <button class="btn btn-default" onclick="loadAll()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>
      Refresh
    </button>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Filter..." oninput="renderList()">
      <button class="btn-add" id="addBtn" onclick="showCreateModal()" title="Create new" style="display:none">
        <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="item-list" id="itemList"></div>
  </div>
  <div class="content" id="contentPane">
    <div class="empty-state">
      <svg class="icon" style="width:32px;height:32px" viewBox="0 0 24 24"><path d="M16 18l2-2v-7l-5-5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"/><polyline points="13 4 13 9 18 9"/><path d="M18 22l4-4-4-4"/><path d="M22 18h-8"/></svg>
      <div>Select a doc, view, task, trigger, plugin, or config key to inspect</div>
    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script id="script-highlight">
  function W(cls, text) { return '<span class="hl-' + cls + '">' + text + '</span>'; }

  function highlight(src, lang) {
    if (lang === 'html') return highlightHTML(src);
    if (lang === 'js')   return highlightJS(src);
    if (lang === 'css')  return highlightCSS(src);
    if (lang === 'md')   return highlightMarkdown(src);
    return escHtml(src);
  }

  function highlightHTML(src) {
    let out = '';
    let i = 0;
    const len = src.length;
    while (i < len) {
      if (src.startsWith('<!--', i)) {
        const end = src.indexOf('-->', i);
        const slice = end === -1 ? src.slice(i) : src.slice(i, end + 3);
        out += W('cmt', escHtml(slice));
        i += slice.length; continue;
      }
      if (src.startsWith('<!', i) && !src.startsWith('<!--', i)) {
        const end = src.indexOf('>', i);
        const slice = end === -1 ? src.slice(i) : src.slice(i, end + 1);
        out += W('doctype', escHtml(slice));
        i += slice.length; continue;
      }
      if (src.slice(i).match(/^<style[^>]*>/i)) {
        const tagEnd = src.indexOf('>', i);
        out += highlightTag(src.slice(i, tagEnd + 1));
        i = tagEnd + 1;
        const closeIdx = src.toLowerCase().indexOf('<\/style>', i);
        const cssBlock = closeIdx === -1 ? src.slice(i) : src.slice(i, closeIdx);
        out += highlightCSS(cssBlock);
        i += cssBlock.length;
        if (closeIdx !== -1) { out += W('tag', escHtml('</' + 'style>')); i += 8; }
        continue;
      }
      if (src.slice(i).match(/^<script[^>]*>/i)) {
        const tagEnd = src.indexOf('>', i);
        out += highlightTag(src.slice(i, tagEnd + 1));
        i = tagEnd + 1;
        const closeIdx = src.toLowerCase().indexOf('<\/script>', i);
        const jsBlock = closeIdx === -1 ? src.slice(i) : src.slice(i, closeIdx);
        out += highlightJS(jsBlock);
        i += jsBlock.length;
        if (closeIdx !== -1) { out += W('tag', escHtml('</' + 'script>')); i += 9; }
        continue;
      }

  let toastTimer;
  function showToast(msg, type = 'success') {

    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtSize(n) { return n > 1024 ? (n / 1024).toFixed(1) + ' KB' : n + ' B'; }

  function fmtDate(ts) {
    if (!ts) return '';
    const d = new Date(/^\d{10}$/.test(String(ts)) ? ts * 1000 : ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  }

  function fmtTimeout(ms) {
    if (!ms) return 'default';
    if (ms >= 60000) return (ms / 60000) + 'm';
    return (ms / 1000) + 's';
  }

  function usesNameKey(type) { return type === 'docs' || type === 'views' || type === 'tasks' || type === 'triggers' || type === 'plugins'; }

  function lineNums(content) {
    const n = (content || '').split('\n').length;
    return Array.from({length: n}, (_, i) => i + 1).join('\n');
  }

  function detectLang(item) {
    if (item.type === 'views') return 'html';
    if (item.type === 'tasks') return 'js';
    if (item.type === 'plugins') return 'js';
    const name = (item.name || '').toLowerCase();
    if (name.endsWith('.html') || name.endsWith('.htm')) return 'html';
    if (name.endsWith('.css')) return 'css';
    if (name.endsWith('.js')) return 'js';
    const c = (item.content || '').trimStart();
    if (c.startsWith('<!') || c.startsWith('<html') || c.startsWith('<div')) return 'html';
    return 'md';
  }

  async function loadAll() {
    const [docs, views, tasks, triggers, plugins, config] = await Promise.all([
      agy.runSql({ target: "agent", sql: "SELECT name, content, updated_at FROM docs ORDER BY name" }),
      agy.runSql({ target: "agent", sql: "SELECT name, title, LENGTH(content) as content_length, created_at, updated_at FROM views ORDER BY name" }),
      agy.runSql({ target: "agent", sql: "SELECT name, title, description, content, timeout_ms, created_at, updated_at FROM tasks ORDER BY title" }),
      agy.runSql({ target: "agent", sql: "SELECT t.name, t.task_name, t.type, t.config, t.description, t.enabled, t.created_at, t.updated_at, k.title as task_title FROM triggers t LEFT JOIN tasks k ON t.task_name = k.name ORDER BY t.name" }),
      agy.runSql({ target: "agent", sql: "SELECT name, description, version, code, enabled, created_at, updated_at FROM plugins ORDER BY name" }),
      agy.runSql({ target: "agent", sql: "SELECT name AS key, value, description FROM config ORDER BY name" }),
    ]);

    allViews = views || [];
    allTasks = tasks || [];
    allTriggers = triggers || [];
    allPlugins = plugins || [];
    allConfig = config || [];

    document.getElementById('viewsCount').textContent = allViews.length;
    document.getElementById('tasksCount').textContent = allTasks.length;
    document.getElementById('triggersCount').textContent = allTriggers.length;
    document.getElementById('pluginsCount').textContent = allPlugins.length;

    refreshSelected();

  function updateAddBtn() {
    const btn = document.getElementById('addBtn');
    btn.style.display = (mode === 'tasks' || mode === 'docs' || mode === 'triggers' || mode === 'config') ? '' : 'none';
    btn.title = mode === 'tasks' ? 'Create task' : mode === 'docs' ? 'Create doc' : mode === 'triggers' ? 'Create trigger' : mode === 'config' ? 'Add config key' : '';
  }

  async function refreshSelected() {
    if (!selected) return;
    const source = selected.type === 'docs' ? allDocs : selected.type === 'views' ? allViews : selected.type === 'triggers' ? allTriggers : selected.type === 'plugins' ? allPlugins : allTasks;
    const fresh = source.find(i => usesNameKey(selected.type) ? i.name === selected.name : i.id === selected.id);
    if (fresh) {
      const m = selected.type;
      selected = { ...selected, ...fresh, type: m };
      if (m === 'triggers') selected.trigType = fresh.type;
      if (m === 'views' && !selected.content) {
        const rows = await agy.runSql({ target: "agent", sql: "SELECT content FROM views WHERE name = ?", params: [selected.name] });
        if (rows[0]) selected.content = rows[0].content;
      }
      if (!editing) showContent();
    }
    else clearContent();
  }

  async function saveItem() {
    const editor = document.getElementById('editor');
    if (!editor || !selected) return;
    const newContent = editor.value;
    const now = Math.floor(Date.now() / 1000);
    const table = selected.type === 'docs' ? 'docs' : selected.type === 'views' ? 'views' : 'tasks';
    const whereClause = usesNameKey(selected.type) ? 'WHERE name = ?' : 'WHERE id = ?';
    const whereParam = usesNameKey(selected.type) ? selected.name : selected.id;
    try {
      await agy.runSql({
        target: "agent",
        sql: "UPDATE " + table + " SET content = ? " + whereClause,
        params: [newContent, whereParam],
        confirmed: true
      });
      selected.content = newContent;
      selected.updated_at = now;
      const source = selected.type === 'docs' ? allDocs : selected.type === 'views' ? allViews : selected.type === 'triggers' ? allTriggers : selected.type === 'plugins' ? allPlugins : allTasks;
      const idx = source.findIndex(i => usesNameKey(selected.type) ? i.name === selected.name : i.id === selected.id);
      if (idx >= 0) Object.assign(source[idx], { content: newContent, updated_at: now });

  async function deleteItem() {
    if (!selected) return;
    const label = selected.type === 'tasks' ? 'task' : selected.type === 'triggers' ? 'trigger' : 'doc';
    const itemName = selected.title || selected.name || selected.description;
    if (!confirm('Delete this ' + label + ' "' + itemName + '"?')) return;
    const table = selected.type === 'tasks' ? 'tasks' : selected.type === 'triggers' ? 'triggers' : 'docs';
    const whereClause = usesNameKey(selected.type) ? 'WHERE name = ?' : 'WHERE id = ?';
    const whereParam = usesNameKey(selected.type) ? selected.name : selected.id;
    try {
      await agy.runSql({
        target: "agent",
        sql: "DELETE FROM " + table + " " + whereClause,
        params: [whereParam],
        confirmed: true

      clearContent();
      await loadAll();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  async function duplicateTask() {
    if (!selected || selected.type !== 'tasks') return;
    const newName = selected.name + '-copy';
    const newTitle = selected.title + ' (copy)';
    try {
      await agy.runSql({
        target: "agent",
        sql: "INSERT INTO tasks (name, title, description, content, timeout_ms) VALUES (?, ?, ?, ?, ?)",
        params: [newName, newTitle, selected.description || '', selected.content || '', selected.timeout_ms || null],
        confirmed: true
      });
      showToast('Task cloned');
      await loadAll();
    } catch (err) {
      showToast('Clone failed: ' + err.message, 'error');
    }
  }

  async function runTask() {
    if (!selected || selected.type !== 'tasks') return;
    lastRunOutput = { status: 'running', logs: [], result: null, error: null };
    showContent();

      const { runId } = await agy.startTask({ taskName: selected.name });
      const result = await agy.waitFor({ topic: 'task:run:' + runId, timeoutMs: selected.timeout_ms || 120000 });

        status: result.status || 'completed',
        logs: result.logs || [],
        result: result.result,
        error: result.error
      };
    } catch (err) {
      lastRunOutput = { status: 'error', logs: [], result: null, error: err.message || String(err) };
    }
    showContent();
  }

  async function toggleTrigger() {
    if (!selected || selected.type !== 'triggers') return;
    const newEnabled = selected.enabled ? 0 : 1;

      await agy.runSql({
        target: "agent",
        sql: "UPDATE triggers SET enabled = ? WHERE name = ?",

      await loadAll();

      if (fresh) { selected = { type: 'triggers', ...fresh }; showContent(); renderList(); }
    } catch (err) {
      showToast('Toggle failed: ' + err.message, 'error');

  async function saveTrigger() {

      showToast('Save failed: ' + err.message, 'error');

        sql: "UPDATE plugins SET enabled = ? WHERE name = ?",

    }
  }

        return searchStr.toLowerCase().includes(q);
      });
      list.innerHTML = items.map(t => {
        const active = selected && selected.type === 'triggers' && selected.name === t.name;
        const typeBadgeCls = 'trigger-' + t.type;
        const enabledCls = t.enabled ? 'trigger-enabled' : 'trigger-disabled';
        const label = t.description || (t.type + ' \u2192 ' + (t.task_title || t.task_name));
        let configHint = '';
        try {
          const cfg = JSON.parse(t.config || '{}');
          if (t.type === 'schedule') configHint = cfg.expression || '';
          else if (t.type === 'http') configHint = (cfg.method || 'POST') + ' ' + (cfg.path || '');
          else if (t.type === 'event') configHint = cfg.topic || '';
        } catch(e) { configHint = t.config || ''; }
        return '<div class="list-item ' + (active ? 'active' : '') + '" onclick="selectItem(\'triggers\', \'' + escHtml(t.name) + '\')">'
          + '<div class="item-name">' + escHtml(label) + '</div>'
          + '<div class="item-meta">'
          + '<span class="badge ' + typeBadgeCls + '">' + escHtml(t.type) + '</span>'
          + '<span class="badge ' + enabledCls + '">' + (t.enabled ? 'enabled' : 'disabled') + '</span>'
          + (configHint ? '<span style="opacity:0.7;font-family:var(--font-mono);font-size:10px">' + escHtml(configHint) + '</span>' : '')
          + '</div></div>';
      }).join('');
    } else if (mode === 'plugins') {
      const items = allPlugins.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
      list.innerHTML = items.map(p => {
        const active = selected && selected.type === 'plugins' && selected.name === p.name;
        const enabledCls = p.enabled ? 'plugin-enabled' : 'plugin-disabled';
        return '<div class="list-item ' + (active ? 'active' : '') + '" onclick="selectPlugin(\'' + p.name + '\')">'
          + '<div class="item-name">' + escHtml(p.name) + '</div>'
          + '<div class="item-meta">'
          + '<span class="badge version-badge">v' + escHtml(p.version) + '</span>'
          + '<span class="badge ' + enabledCls + '">' + (p.enabled ? 'enabled' : 'disabled') + '</span>'
          + '<span>' + fmtDate(p.updated_at) + '</span>'
          + '</div></div>';
      }).join('');
    } else if (mode === 'config') {
      const items = allConfig.filter(c => c.key.toLowerCase().includes(q) || (c.value || '').toLowerCase().includes(q));
      list.innerHTML = items.map(c => {
        const active = selected && selected.type === 'config' && selected.key === c.key;
        return '<div class="list-item ' + (active ? 'active' : '') + '" onclick="selectConfigItem(\'' + escHtml(c.key).replace(/'/g, "\\'") + '\')">'
          + '<div class="item-name">' + escHtml(c.key) + '</div>'
          + '<div class="item-meta"><span style="font-family:var(--font-mono);font-size:11px;opacity:0.7">' + escHtml(String(c.value).substring(0, 40)) + '</span></div>'
          + '</div>';
      }).join('');
    }
  }

  async function selectItem(type, id) {
    if (dirty && !confirm('Discard unsaved changes?')) return;
    const source = type === 'docs' ? allDocs : type === 'views' ? allViews : type === 'triggers' ? allTriggers : type === 'plugins' ? allPlugins : allTasks;
    const item = source.find(i => usesNameKey(type) ? i.name === id : i.id === id);
    if (!item) return;
    selected = { ...item, type };
    if (type === 'triggers') selected.trigType = item.type;
    if (type === 'views' && !selected.content) {
      const rows = await agy.runSql({ target: "agent", sql: "SELECT content FROM views WHERE name = ?", params: [id] });
      if (rows[0]) selected.content = rows[0].content;
    }
    editing = false; dirty = false; lastRunOutput = null;
    showContent(); renderList();
  }

  function selectPlugin(name) {
    if (dirty && !confirm('Discard unsaved changes?')) return;
    const item = allPlugins.find(p => p.name === name);
    if (!item) return;
    selected = { ...item, type: 'plugins' };
    editing = false; dirty = false; lastRunOutput = null;
    showContent(); renderList();
  }

  function showContent() {
    if (!selected) { clearContent(); return; }
    const s = selected;
    const size = fmtSize(s.content ? s.content.length : 0);
    const lines = (s.content || '').split('\n').length;

    const labelMap = { docs: 'doc-label', views: 'view-label', tasks: 'task-label', triggers: 'trigger-label', plugins: 'plugin-label' };
    const nameMap = { docs: 'DOC', views: 'VIEW', tasks: 'TASK', triggers: 'TRIGGER', plugins: 'PLUGIN' };
    const typeLabel = '<span class="type-label ' + labelMap[s.type] + '">' + nameMap[s.type] + '</span>';

    const displayName = s.title || s.name;
    let metaInfo = !usesNameKey(s.type) ? 'id: ' + s.id + ' \u00b7 ' : '';
    metaInfo += size + ' \u00b7 ' + lines + ' lines';
    if (s.type === 'views' && s.title) metaInfo = s.name + ' \u00b7 ' + metaInfo;
    if (s.type === 'tasks' && s.timeout_ms) metaInfo += ' \u00b7 timeout: ' + fmtTimeout(s.timeout_ms);
    const ts = s.updated_at || s.created_at;
    if (ts) metaInfo += ' \u00b7 ' + fmtDate(ts);

    if (editing && s.type === 'triggers') {
      let configPretty = s.config || '{}';
      try { configPretty = JSON.stringify(JSON.parse(configPretty), null, 2); } catch(e) {}
      const taskOptions = allTasks.map(t => '<option value="' + escHtml(t.name) + '"' + (t.name === s.task_name ? ' selected' : '') + '>' + escHtml(t.title) + '</option>').join('');
      const triggerTitle = s.description || (s.trigType + ' \u2192 ' + (s.task_title || s.task_name));
      let actionBtns = '<button class="btn btn-default" onclick="cancelEdit()">' + ICO.x + ' Cancel</button>'
        + '<button class="btn btn-primary" onclick="saveTrigger()">' + ICO.save + ' Save</button>';
      document.getElementById('contentPane').innerHTML =
        '<div class="content-header">'
        + '<div class="left">' + typeLabel
        + '<span class="title">' + escHtml(triggerTitle) + '</span>'
        + '<span id="dirtyDot"></span></div>'
        + '<div class="actions">' + actionBtns + '</div></div>'
        + '<div class="content-body"><div class="trigger-detail" style="max-width:600px;padding:16px 20px">'
        + '<div class="detail-row"><div class="detail-label">Task</div><div class="detail-value" style="flex:1"><select id="trigEditTask" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none">' + taskOptions + '</select></div></div>'
        + '<div class="detail-row"><div class="detail-label">Type</div><div class="detail-value" style="flex:1"><select id="trigEditType" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none"><option value="schedule"' + (s.trigType==='schedule'?' selected':'') + '>schedule</option><option value="http"' + (s.trigType==='http'?' selected':'') + '>http</option><option value="event"' + (s.trigType==='event'?' selected':'') + '>event</option></select></div></div>'
        + '<div class="detail-row"><div class="detail-label">Description</div><div class="detail-value" style="flex:1"><input type="text" id="trigEditDesc" value="' + escHtml(s.description || '') + '" placeholder="Optional description" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none"></div></div>'
        + '<div class="detail-row"><div class="detail-label">Config (JSON)</div><div class="detail-value" style="flex:1"><textarea id="trigEditConfig" rows="5" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-mono);outline:none;resize:vertical">' + escHtml(configPretty) + '</textarea></div></div>'
        + '</div></div>';
      document.querySelectorAll('#trigEditTask, #trigEditType, #trigEditDesc, #trigEditConfig').forEach(el => {
        el.addEventListener('input', () => { dirty = true; updateDirty(); });
        el.addEventListener('change', () => { dirty = true; updateDirty(); });
      });
      updateDirty();
    } else if (editing) {
      let actionBtns = '<button class="btn btn-default" onclick="cancelEdit()">' + ICO.x + ' Cancel</button>'
        + '<button class="btn btn-primary" onclick="saveItem()">' + ICO.save + ' Save</button>';
      document.getElementById('contentPane').innerHTML =
        '<div class="content-header">'
        + '<div class="left">' + typeLabel
        + '<span class="title">' + escHtml(displayName) + '</span>'
        + '<span id="dirtyDot"></span></div>'
        + '<div class="actions">' + actionBtns + '</div></div>'
        + '<div class="content-body editing">'
        + '<textarea id="editor" spellcheck="false">' + escHtml(s.content || '') + '</textarea>'
        + '</div>'
        + renderRunOutput();
      const editor = document.getElementById('editor');
      editor.addEventListener('input', () => { dirty = true; updateDirty(); });
      editor.addEventListener('keydown', handleEditorKeys);
      editor.focus(); updateDirty();
    } else {
      const content = s.content || '';
      const nums = lineNums(content);
      const lang = detectLang(s);
      const highlighted = highlight(content, lang);
      let actionBtns = '<button class="btn btn-default" onclick="startEdit()">' + ICO.edit + ' Edit</button>';
      if (s.type === 'tasks') {
        actionBtns = '<button class="btn btn-green" onclick="runTask()">' + ICO.play + ' Run</button>'
          + '<button class="btn btn-default" onclick="duplicateTask()">' + ICO.copy + ' Clone</button>'
          + '<button class="btn btn-danger" onclick="deleteItem()">' + ICO.trash + '</button>'
          + actionBtns;
      } else if (s.type === 'docs') {
        actionBtns = '<button class="btn btn-danger" onclick="deleteItem()">' + ICO.trash + '</button>'
          + actionBtns;
      } else if (s.type === 'triggers') {
        const triggerTitle = s.description || (s.trigType + ' \u2192 ' + (s.task_title || s.task_name));
        let configPretty = s.config || '{}';
        try { configPretty = JSON.stringify(JSON.parse(configPretty), null, 2); } catch(e) {}
        actionBtns = '<button class="btn ' + (s.enabled ? 'btn-default' : 'btn-green') + '" onclick="toggleTrigger()">'
          + (s.enabled ? ICO.x + ' Disable' : ICO.play + ' Enable') + '</button>'
          + '<button class="btn btn-default" onclick="startEdit()">' + ICO.edit + ' Edit</button>'
          + '<button class="btn btn-danger" onclick="deleteItem()">' + ICO.trash + '</button>';
        document.getElementById('contentPane').innerHTML =
          '<div class="content-header">'
          + '<div class="left">' + typeLabel
          + '<span class="title">' + escHtml(triggerTitle) + '</span>'
          + '<span class="info">' + metaInfo + '</span></div>'
          + '<div class="actions">' + actionBtns + '</div></div>'
          + '<div class="content-body"><div class="trigger-detail" style="padding:16px 20px">'
          + '<div class="detail-row"><div class="detail-label">Name</div><div class="detail-value">' + escHtml(s.name) + '</div></div>'
          + '<div class="detail-row"><div class="detail-label">Type</div><div class="detail-value"><span class="badge trigger-' + s.trigType + '">' + escHtml(s.trigType) + '</span></div></div>'
          + '<div class="detail-row"><div class="detail-label">Status</div><div class="detail-value"><span class="badge ' + (s.enabled ? 'trigger-enabled' : 'trigger-disabled') + '">' + (s.enabled ? 'Enabled' : 'Disabled') + '</span></div></div>'
          + '<div class="detail-row"><div class="detail-label">Task</div><div class="detail-value">' + escHtml(s.task_title || '(unknown)') + ' <span style="opacity:0.5">(' + escHtml(s.task_name) + ')</span></div></div>'
          + (s.description ? '<div class="detail-row"><div class="detail-label">Description</div><div class="detail-value">' + escHtml(s.description) + '</div></div>' : '')
          + '<div class="detail-row"><div class="detail-label">Config</div><div class="detail-value" style="flex:1"><div class="config-block">' + escHtml(configPretty) + '</div></div></div>'
          + (s.created_at ? '<div class="detail-row"><div class="detail-label">Created</div><div class="detail-value">' + fmtDate(s.created_at) + '</div></div>' : '')
          + (s.updated_at ? '<div class="detail-row"><div class="detail-label">Updated</div><div class="detail-value">' + fmtDate(s.updated_at) + '</div></div>' : '')
          + '</div></div>';
        return;
      }
      if (s.type === 'plugins') {
        const codeContent = s.code || '';
        const nums = lineNums(codeContent);
        const highlighted = highlightJS(codeContent);
        const enableBtnCls = s.enabled ? 'btn-default' : 'btn-green';
        const enableBtnLabel = s.enabled ? ICO.x + ' Disable' : ICO.play + ' Enable';
        const pluginDocName = 'plugin.' + s.name;
        const hasDoc = allDocs.some(d => d.name === pluginDocName);
        const docBtn = hasDoc ? '<button class="btn btn-default" onclick="setMode(\'docs\');setTimeout(()=>{const d=allDocs.find(x=>x.name===\'' + pluginDocName + '\');if(d)selectItem(\'docs\',d.name)},50)">' + ICO.edit + ' Docs</button>' : '';
        document.getElementById('contentPane').innerHTML =
          '<div class="content-header">'
          + '<div class="left">' + typeLabel
          + '<span class="title">' + escHtml(s.name) + '</span>'
          + '<span class="info">v' + escHtml(s.version) + ' \u00b7 ' + fmtSize(codeContent.length) + ' \u00b7 ' + fmtDate(s.updated_at) + '</span></div>'
          + '<div class="actions">'
          + docBtn
          + '<button class="btn ' + enableBtnCls + '" onclick="togglePlugin()">' + enableBtnLabel + '</button>'
          + '</div></div>'
          + '<div class="content-body" style="padding:0">'
          + '<div style="padding:16px 20px;border-bottom:1px solid var(--color-divider)">'
          + '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
          + '<span class="badge ' + (s.enabled ? 'plugin-enabled' : 'plugin-disabled') + '">' + (s.enabled ? 'Enabled' : 'Disabled') + '</span>'
          + '<span class="badge version-badge">v' + escHtml(s.version) + '</span>'
          + (s.description ? '<span style="font-size:12px;color:var(--color-text2)">' + escHtml(s.description) + '</span>' : '')
          + '</div></div>'
          + '<div style="flex:1;overflow:auto;padding:16px 20px">'
          + '<div class="code-wrap">'
          + '<pre class="line-nums">' + nums + '</pre>'
          + '<pre><code>' + (highlighted || '(empty)') + '</code></pre>'
          + '</div></div></div>';
        return;
      }
      // Show description for tasks
      let descriptionBlock = '';
      if (s.type === 'tasks' && s.description) {
        descriptionBlock = '<div style="padding:10px 20px;border-bottom:1px solid var(--color-divider);font-size:12px;color:var(--color-text2)">' + escHtml(s.description) + '</div>';
      }
      document.getElementById('contentPane').innerHTML =
        '<div class="content-header">'
        + '<div class="left">' + typeLabel
        + '<span class="title">' + escHtml(displayName) + '</span>'
        + '<span class="info">' + metaInfo + '</span></div>'
        + '<div class="actions">' + actionBtns + '</div></div>'
        + descriptionBlock
        + '<div class="content-body">'
        + '<div class="code-wrap">'
        + '<pre class="line-nums">' + nums + '</pre>'
        + '<pre><code>' + (highlighted || '(empty)') + '</code></pre>'
        + '</div></div>'
        + renderRunOutput();
    }
  }

  function handleEditorKeys(e) {
    const editor = document.getElementById('editor');
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveItem(); }
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      dirty = true; updateDirty();
    }
    if (e.key === 'Escape') cancelEdit();
  }

  function renderRunOutput() {
    if (!lastRunOutput) return '';
    const r = lastRunOutput;
    const statusCls = r.status === 'running' ? 'running' : r.status === 'completed' ? 'success' : 'error';
    const statusText = r.status === 'running' ? '\u25cf Running\u2026' : r.status === 'completed' ? '\u2713 Completed' : '\u2717 ' + (r.status || 'Error');
    let logHtml = '';
    if (r.logs && r.logs.length) {
      logHtml = r.logs.map(l => {
        const cls = l.level === 'error' ? 'log-error' : l.level === 'warning' ? 'log-warn' : '';
        return '<div class="log-line ' + cls + '">' + escHtml(l.message) + '</div>';
      }).join('');
    }
    let resultHtml = '';
    if (r.result !== undefined && r.result !== null) {
      resultHtml = '<div class="log-line" style="color:var(--color-green-fg);margin-top:4px">\u2192 ' + escHtml(typeof r.result === 'string' ? r.result : JSON.stringify(r.result, null, 2)) + '</div>';
    }
    if (r.error) {
      resultHtml += '<div class="log-line log-error" style="margin-top:4px">Error: ' + escHtml(r.error) + '</div>';
    }
    return '<div class="run-output">'
      + '<div class="run-output-header"><span>Output</span><span class="run-status ' + statusCls + '">' + statusText + '</span></div>'
      + '<div class="run-output-body">' + (logHtml || resultHtml ? logHtml + resultHtml : '<span style="color:var(--color-text1)">(no output)</span>') + '</div></div>';
  }

  function updateDirty() {
    const dot = document.getElementById('dirtyDot');
    if (dot) dot.innerHTML = dirty ? '<span class="dirty-dot"></span>' : '';
  }
  function startEdit() { editing = true; dirty = false; showContent(); }
  function cancelEdit() {
    if (dirty && !confirm('Discard unsaved changes?')) return;
    editing = false; dirty = false; showContent();
  }

  function clearContent() {
    selected = null; editing = false; dirty = false;
    document.getElementById('contentPane').innerHTML =
      '<div class="empty-state">'
      + '<svg class="icon" style="width:32px;height:32px" viewBox="0 0 24 24"><path d="M16 18l2-2v-7l-5-5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"/><polyline points="13 4 13 9 18 9"/><path d="M18 22l4-4-4-4"/><path d="M22 18h-8"/></svg>'
      + '<div>Select a doc, view, task, trigger, plugin, or config key to inspect</div></div>';
  }

  /* ========== Create Modal ========== */
  function showCreateModal() {
    if (mode === 'config') { showCreateConfigModal(); return; }
    if (mode === 'triggers') { showCreateTriggerModal(); return; }
    const isTask = mode === 'tasks';
    const title = isTask ? 'Create Task' : 'Create Doc';
    let fields = '<label>Name</label><input type="text" id="createName" placeholder="' + (isTask ? 'my-task' : 'my-doc') + '" autofocus>';
    if (isTask) {
      fields += '<label>Title</label><input type="text" id="createTitle" placeholder="My Task">';
      fields += '<label>Description</label><input type="text" id="createDesc" placeholder="Optional description">';
      fields += '<label>Timeout (ms)</label><input type="number" id="createTimeout" value="120000" min="1000" step="1000">';
    }
    document.getElementById('modalRoot').innerHTML =
      '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      + '<div class="modal">'
      + '<h3>' + title + '</h3>'
      + fields
      + '<div class="modal-actions">'
      + '<button class="btn btn-default" onclick="closeModal()">' + ICO.x + ' Cancel</button>'
      + '<button class="btn btn-primary" onclick="doCreate()">Create</button>'
      + '</div></div></div>';
    setTimeout(() => document.getElementById('createName').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalRoot').innerHTML = '';
  }

  async function doCreate() {
    const name = document.getElementById('createName').value.trim();
    if (!name) { showToast('Name is required', 'error'); return; }
    const isTask = mode === 'tasks';
    try {
      if (isTask) {
        const title = (document.getElementById('createTitle').value || '').trim() || name;
        const desc = document.getElementById('createDesc').value.trim();
        const timeout = parseInt(document.getElementById('createTimeout').value) || 120000;
        await agy.runSql({
          target: "agent",
          sql: "INSERT INTO tasks (name, title, description, content, timeout_ms) VALUES (?, ?, ?, ?, ?)",
          params: [name, title, desc, '', timeout],
          confirmed: true
        });
      } else {
        await agy.runSql({
          target: "agent",
          sql: "INSERT INTO docs (name, content) VALUES (?, ?)",
          params: [name, ''],
          confirmed: true
        });
      }
      closeModal();
      showToast((isTask ? 'Task' : 'Doc') + ' created');
      await loadAll();
      const source = isTask ? allTasks : allDocs;
      const created = source.find(i => i.name === name);
      if (created) {
        selected = { type: isTask ? 'tasks' : 'docs', ...created };
        editing = true; dirty = false;
        showContent(); renderList();
      }
    } catch (err) {
      showToast('Create failed: ' + err.message, 'error');
    }
  }

  function showCreateTriggerModal() {
    const taskOptions = allTasks.map(t => '<option value="' + escHtml(t.name) + '">' + escHtml(t.title) + '</option>').join('');
    document.getElementById('modalRoot').innerHTML =
      '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      + '<div class="modal">'
      + '<h3>Create Trigger</h3>'
      + '<label>Name</label><input type="text" id="createTrigName" placeholder="my-trigger">'
      + '<label>Task</label><select id="createTrigTask" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none">' + taskOptions + '</select>'
      + '<label>Type</label><select id="createTrigType" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none"><option value="schedule">schedule</option><option value="http">http</option><option value="event">event</option></select>'
      + '<label>Description</label><input type="text" id="createTrigDesc" placeholder="Optional description">'
      + '<label>Config (JSON)</label><textarea id="createTrigConfig" rows="3" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-mono);outline:none;resize:vertical">{}</textarea>'
      + '<div class="modal-actions">'
      + '<button class="btn btn-default" onclick="closeModal()">Cancel</button>'
      + '<button class="btn btn-primary" onclick="doCreateTrigger()">Create</button>'
      + '</div></div></div>';
    setTimeout(() => document.getElementById('createTrigName').focus(), 50);
  }

  async function doCreateTrigger() {
    const trigName = document.getElementById('createTrigName').value.trim();
    const taskName = document.getElementById('createTrigTask').value;
    const type = document.getElementById('createTrigType').value;
    const desc = document.getElementById('createTrigDesc').value.trim();
    const configStr = document.getElementById('createTrigConfig').value.trim();
    if (!trigName) { showToast('Name is required', 'error'); return; }
    if (!taskName) { showToast('Select a task', 'error'); return; }
    try { JSON.parse(configStr); } catch(e) { showToast('Invalid JSON in config', 'error'); return; }
    try {
      await agy.runSql({
        target: "agent",
        sql: "INSERT INTO triggers (name, task_name, type, config, description, enabled) VALUES (?, ?, ?, ?, ?, 1)",
        params: [trigName, taskName, type, configStr, desc],
        confirmed: true
      });
      closeModal();
      showToast('Trigger created');
      await loadAll();
      const created = allTriggers[allTriggers.length - 1];
      if (created) {
        selected = { type: 'triggers', ...created };
        showContent(); renderList();
      }
    } catch (err) {
      showToast('Create failed: ' + err.message, 'error');
    }
  }
</script>
<script id="script-config">
  const CONFIG_REFERENCE = [
    { key: 'backup.intervalHours', type: 'number', def: '24', range: '1\u20138760', desc: 'Auto backup interval (hours)' },
    { key: 'backup.maxCount', type: 'number', def: '5', range: '1\u2013100', desc: 'Max backups to keep per agent' },
    { key: 'cleanup.sessionRetentionDays', type: 'number', def: '30', range: '0\u20133650', desc: 'Delete old sessions (0 = keep forever)' },
    { key: 'cleanup.taskLogRetentionDays', type: 'number', def: '30', range: '0\u20133650', desc: 'Delete old task logs (0 = keep forever)' },
    { key: 'httpApi.port', type: 'number', def: '9877', range: '1\u201365535', desc: 'HTTP API port (restart required)' },
  ];

  function selectConfigItem(key) {
    if (dirty && !confirm('Discard unsaved changes?')) return;
    const item = allConfig.find(c => c.key === key);
    if (!item) return;
    selected = { type: 'config', key: item.key, value: item.value, description: item.description };
    editing = false; dirty = false;
    showConfigContent(); renderList();
  }

  function showConfigContent() {
    if (!selected || selected.type !== 'config') { showConfigOverview(); return; }
    const s = selected;
    const ref = CONFIG_REFERENCE.find(r => r.key === s.key);
    const typeLabel = '<span class="type-label" style="background:color-mix(in srgb, var(--color-green-fg) 15%, transparent);color:var(--color-green-fg)">CONFIG</span>';

    if (editing) {
      document.getElementById('contentPane').innerHTML =
        '<div class="content-header">'
        + '<div class="left">' + typeLabel
        + '<span class="title">' + escHtml(s.key) + '</span>'
        + '<span id="dirtyDot"></span></div>'
        + '<div class="actions">'
        + '<button class="btn btn-default" onclick="cancelConfigEdit()">' + ICO.x + ' Cancel</button>'
        + '<button class="btn btn-primary" onclick="saveConfigKey()">' + ICO.save + ' Save</button>'
        + '</div></div>'
        + '<div class="content-body" style="padding:20px">'
        + '<div style="max-width:500px">'
        + '<label style="display:block;font-size:11px;font-weight:600;color:var(--color-text2);margin-bottom:6px">Value</label>'
        + '<input type="text" id="configEditValue" value="' + escHtml(s.value || '') + '" '
        + 'style="width:100%;padding:8px 12px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-family:var(--font-mono);font-size:13px;outline:none" '
        + 'oninput="dirty=true;updateDirty()">'
        + (ref ? '<div style="margin-top:12px;font-size:11px;color:var(--color-text1)">Type: <code style="font-family:var(--font-mono);font-size:11px;background:var(--color-bg3);padding:1px 5px;border-radius:3px">' + ref.type + '</code> \u00b7 Default: <code style="font-family:var(--font-mono);font-size:11px;background:var(--color-bg3);padding:1px 5px;border-radius:3px">' + ref.def + '</code>' + (ref.range ? ' \u00b7 Range: ' + ref.range : '') + '<br>' + escHtml(ref.desc) + '</div>' : '')
        + '</div></div>';
      setTimeout(() => {
        const inp = document.getElementById('configEditValue');
        if (inp) { inp.focus(); inp.select(); }
      }, 50);
      updateDirty();
    } else {
      const descInfo = s.description ? '<div style="margin-top:12px;font-size:12px;color:var(--color-text2)">' + escHtml(s.description) + '</div>' : '';
      document.getElementById('contentPane').innerHTML =
        '<div class="content-header">'
        + '<div class="left">' + typeLabel
        + '<span class="title">' + escHtml(s.key) + '</span></div>'
        + '<div class="actions">'
        + '<button class="btn btn-default" onclick="editing=true;dirty=false;showConfigContent()">' + ICO.edit + ' Edit</button>'
        + '<button class="btn btn-danger" onclick="deleteConfigKey(\'' + escHtml(s.key).replace(/'/g, "\\'") + '\')">' + ICO.trash + ' Delete</button>'
        + '</div></div>'
        + '<div class="content-body" style="padding:20px">'
        + '<div style="max-width:600px">'
        + '<div style="margin-bottom:20px">'
        + '<div style="font-size:11px;font-weight:600;color:var(--color-text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Value</div>'
        + '<div style="font-family:var(--font-mono);font-size:14px;color:var(--color-text3);padding:12px 16px;background:var(--color-bg2);border:1px solid var(--color-divider);border-radius:var(--radius-md)">' + escHtml(s.value || '(empty)') + '</div>'
        + descInfo
        + '</div>'
        + (ref ? '<div class="config-info-box"><strong>' + escHtml(ref.desc) + '</strong><br>Type: <code>' + ref.type + '</code> \u00b7 Default: <code>' + ref.def + '</code>' + (ref.range ? ' \u00b7 Range: ' + ref.range : '') + '</div>' : '<div class="config-info-box">Custom config key. No reference info available.</div>')
        + '</div></div>';
    }
  }

  function showConfigOverview() {
    const typeLabel = '<span class="type-label" style="background:color-mix(in srgb, var(--color-green-fg) 15%, transparent);color:var(--color-green-fg)">CONFIG</span>';
    let tableRows = '';
    if (allConfig.length === 0) {
      tableRows = '<tr><td colspan="3" class="config-empty">No config keys set. Using defaults for all settings.</td></tr>';
    } else {
      tableRows = allConfig.map(c => {
        return '<tr>'
          + '<td class="key-cell">' + escHtml(c.key) + '</td>'
          + '<td class="val-cell">' + escHtml(c.value) + '</td>'
          + '<td class="actions-cell">'
          + '<button onclick="selectConfigItem(\'' + escHtml(c.key).replace(/'/g, "\\'") + '\')" title="View/Edit">' + ICO.edit + '</button>'
          + '<button class="del" onclick="deleteConfigKey(\'' + escHtml(c.key).replace(/'/g, "\\'") + '\')" title="Delete">' + ICO.trash + '</button>'
          + '</td></tr>';
      }).join('');
    }

    let refRows = CONFIG_REFERENCE.map(r => {
      const current = allConfig.find(c => c.key === r.key);
      const val = current ? '<span style="color:var(--color-accent);font-weight:500">' + escHtml(current.value) + '</span>' : '<span style="opacity:0.5">' + r.def + '</span>';
      return '<tr><td>' + escHtml(r.key) + '</td><td>' + val + '</td><td>' + escHtml(r.desc) + '</td></tr>';
    }).join('');

    document.getElementById('contentPane').innerHTML =
      '<div class="content-header">'
      + '<div class="left">' + typeLabel + '<span class="title">Agent Configuration</span></div>'
      + '<div class="actions">'
      + '<button class="btn btn-default" onclick="loadAll()">'
      + '<svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg> Refresh</button>'
      + '</div></div>'
      + '<div class="content-body" style="padding:20px">'
      + '<div style="margin-bottom:24px">'
      + '<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--color-text3)">Active Overrides</div>'
      + '<table class="config-table"><thead><tr><th>Key</th><th>Value</th><th style="width:80px"></th></tr></thead><tbody>' + tableRows + '</tbody></table>'
      + '</div>'
      + '<div>'
      + '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--color-text3)">Available Settings</div>'
      + '<div class="config-info-box">Settings resolve in order: <code>Agent DB</code> \u2192 <code>Global</code> \u2192 <code>Default</code>. Agent-level overrides take priority.</div>'
      + '<table class="config-ref-table"><thead><tr><th>Key</th><th>Current</th><th>Description</th></tr></thead><tbody>' + refRows + '</tbody></table>'
      + '</div></div>';
  }

  function cancelConfigEdit() {
    if (dirty && !confirm('Discard changes?')) return;
    editing = false; dirty = false;
    showConfigContent();
  }

  async function saveConfigKey() {
    const input = document.getElementById('configEditValue');
    if (!input || !selected) return;
    const newValue = input.value;
    try {
      await agy.runSql({
        target: "agent",
        sql: "INSERT OR REPLACE INTO config (name, value) VALUES (?, ?)",
        params: [selected.key, newValue],
        confirmed: true
      });
      selected.value = newValue;
      const idx = allConfig.findIndex(c => c.key === selected.key);
      if (idx >= 0) allConfig[idx].value = newValue;
      else allConfig.push({ key: selected.key, value: newValue });
      allConfig.sort((a, b) => a.key.localeCompare(b.key));
      document.getElementById('configCount').textContent = allConfig.length;
      dirty = false; editing = false;
      showConfigContent(); renderList();
      showToast('Config saved');
    } catch (err) {
      showToast('Save failed: ' + err.message, 'error');
    }
  }

  async function deleteConfigKey(key) {
    if (!confirm('Delete config key "' + key + '"? The setting will revert to its default.')) return;
    try {
      await agy.runSql({
        target: "agent",
        sql: "DELETE FROM config WHERE name = ?",
        params: [key],
        confirmed: true
      });
      allConfig = allConfig.filter(c => c.key !== key);
      document.getElementById('configCount').textContent = allConfig.length;
      if (selected && selected.type === 'config' && selected.key === key) {
        selected = null; editing = false; dirty = false;
      }
      showToast('Config key deleted');
      if (mode === 'config' && !selected) showConfigOverview();
      else if (selected) showConfigContent();
      renderList();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  function showCreateConfigModal() {
    const existingKeys = new Set(allConfig.map(c => c.key));
    const suggestOptions = CONFIG_REFERENCE
      .filter(r => !existingKeys.has(r.key))
      .map(r => '<option value="' + escHtml(r.key) + '">' + escHtml(r.key) + ' \u2014 ' + escHtml(r.desc) + '</option>')
      .join('');

    document.getElementById('modalRoot').innerHTML =
      '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      + '<div class="modal">'
      + '<h3>Add Config Key</h3>'
      + (suggestOptions ? '<label>Preset (optional)</label><select id="configPreset" onchange="applyConfigPreset()" style="width:100%;padding:7px 10px;border:1px solid var(--color-input-border);border-radius:var(--radius-md);background:var(--color-input-bg);color:var(--color-text3);font-size:12px;font-family:var(--font-family);outline:none"><option value="">Custom key\u2026</option>' + suggestOptions + '</select>' : '')
      + '<label>Key</label><input type="text" id="createConfigKey" placeholder="setting.name" autofocus>'
      + '<label>Value</label><input type="text" id="createConfigValue" placeholder="value">'
      + '<div class="modal-actions">'
      + '<button class="btn btn-default" onclick="closeModal()">' + ICO.x + ' Cancel</button>'
      + '<button class="btn btn-primary" onclick="doCreateConfig()">Save</button>'
      + '</div></div></div>';
    setTimeout(() => document.getElementById('createConfigKey').focus(), 50);
  }

  function applyConfigPreset() {
    const sel = document.getElementById('configPreset');
    const keyInput = document.getElementById('createConfigKey');
    const valInput = document.getElementById('createConfigValue');
    if (sel.value) {
      keyInput.value = sel.value;
      const ref = CONFIG_REFERENCE.find(r => r.key === sel.value);
      if (ref) valInput.value = ref.def;
      valInput.focus();
    }
  }

  async function doCreateConfig() {
    const key = document.getElementById('createConfigKey').value.trim();
    const value = document.getElementById('createConfigValue').value;
    if (!key) { showToast('Key is required', 'error'); return; }
    try {
      await agy.runSql({
        target: "agent",
        sql: "INSERT OR REPLACE INTO config (name, value) VALUES (?, ?)",
        params: [key, value],
        confirmed: true
      });
      closeModal();
      showToast('Config key added');
      await loadAll();
      selected = { type: 'config', key, value };
      editing = false; dirty = false;
      showConfigContent(); renderList();
    } catch (err) {
      showToast('Create failed: ' + err.message, 'error');
    }
  }
</script>
<script id="script-init">
  loadAll();
</script>
</body>
</html>

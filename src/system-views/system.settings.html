<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Settings</title>
  <!--
    SECTIONS:
    style-layout     – page shell: header, search bar, tab bar, scroll area
    style-components – setting rows, categories, inputs, buttons, badges
    style-toast      – toast notification overlay
    script-data      – state, constants, DB operations (load / save / reset)
    script-render    – DOM rendering, filtering, toast
    script-init      – event wiring and startup
  -->
<style id="style-layout">
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: var(--font-family);
    background: var(--color-bg1);
    color: var(--color-text3);
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 20px 32px 0;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text4);
    margin: 0 0 4px;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--color-text1);
    margin-bottom: 16px;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--color-text2);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    font-family: var(--font-family);
    background: var(--color-input-bg);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-md);
    color: var(--color-text3);
    outline: none;
    transition: border var(--transition-fast);
  }
  .search-input::placeholder { color: var(--color-placeholder); }
  .search-input:focus { border-color: var(--color-focus-border); }
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--color-border);
    padding: 0;
  }
  .tab-btn {
    padding: 6px 16px;
    font-size: 12px;
    font-family: var(--font-family);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--color-text2);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .tab-btn:hover { color: var(--color-text3); }
  .tab-btn.active {
    color: var(--color-text4);
    border-bottom-color: var(--color-accent);
  }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 32px 40px;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
</style>

<style id="style-components">
  .category { margin-top: 24px; }
  .category-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--color-divider);
  }
  .setting-row {
    padding: 14px 0;
    border-bottom: 1px solid var(--color-divider);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .setting-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text4);
    font-family: var(--font-mono);
  }
  .badge-modified {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--color-accent);
    color: #fff;
    font-weight: 600;
  }
  .setting-desc {
    font-size: 12px;
    color: var(--color-text1);
    line-height: 1.5;
    max-width: 600px;
    margin-bottom: 8px;
  }
  .setting-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-input {
    padding: 5px 10px;
    font-size: 13px;
    font-family: var(--font-mono);
    background: var(--color-input-bg);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-sm);
    color: var(--color-text3);
    outline: none;
    min-width: 260px;
    transition: border var(--transition-fast);
  }
  .setting-input:focus { border-color: var(--color-focus-border); }
  .setting-input.changed { border-color: var(--color-accent); }
  .btn {
    padding: 4px 12px;
    font-size: 12px;
    font-family: var(--font-family);
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text3);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn:hover { background: var(--color-bg3); color: var(--color-text4); }
  .btn-primary {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }
  .btn-reset {
    color: var(--color-text2);
    border-color: transparent;
    background: transparent;
  }
  .btn-reset:hover { color: var(--color-red-fg); background: var(--color-red-bg); border-color: transparent; }
  .btn-save, .btn-discard { display: none; }
  .setting-row.has-pending .btn-save,
  .setting-row.has-pending .btn-discard { display: inline-flex; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text2);
    font-size: 14px;
  }
  .modified-count {
    font-size: 11px;
    color: var(--color-text2);
    margin-left: auto;
    padding-right: 4px;
    line-height: 32px;
  }
</style>

<style id="style-toast">
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-family: var(--font-family);
    color: #fff;
    z-index: 1000;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--color-green-fg); }
  .toast.error { background: var(--color-red-fg); }
</style>
</head>
<body>

<div class="header">
  <h1>Settings</h1>
  <div class="subtitle">Manage application configuration. Modified settings override global defaults.</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" placeholder="Search settings..." autocomplete="off" spellcheck="false">
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-filter="all">All</button>
    <button class="tab-btn" data-filter="modified">Modified</button>
    <span class="modified-count" id="modifiedCount"></span>
  </div>
</div>

<div class="content" id="settingsContainer"></div>
<div class="toast" id="toast"></div>

<script id="script-data">
  let settings = [];
  const pendingChanges = {};

  const CATEGORY_LABELS = {
    'system': 'System',
    'system.backup': 'Backup',
    'system.cleanup': 'Cleanup',
    'system.httpApi': 'HTTP API',
    'plugin': 'Plugins',
    'custom': 'Custom'
  };

  function parseValue(raw) {
    if (raw === null) return '';
    try { return JSON.parse(raw); } catch { return raw; }
  }

  async function loadSettings() {
    const rows = await window.agentwfy.runSql({
      target: 'agent',
      sql: 'SELECT name, value, description FROM config ORDER BY name'
    });
    settings = rows.map(r => ({
      name: r.name,
      value: r.value,
      description: r.description || '',
      isModified: r.value !== null,
      category: r.name.includes('.')
        ? r.name.split('.').slice(0, -1).join('.')
        : 'custom'
    }));
    for (const key of Object.keys(pendingChanges)) {
      if (!settings.some(s => s.name === key)) delete pendingChanges[key];
    }
  }

  async function saveSetting(name) {
    const val = pendingChanges[name];
    if (val === undefined) return;

    let jsonVal;
    if (val === '') {
      jsonVal = null;
    } else {
      const trimmed = val.trim();
      if (trimmed === 'true' || trimmed === 'false' || trimmed === 'null' ||
          (trimmed !== '' && !isNaN(Number(trimmed)))) {
        jsonVal = trimmed;
      } else {
        jsonVal = JSON.stringify(trimmed);
      }
    }

    try {
      await window.agentwfy.runSql({
        target: 'agent',
        sql: 'UPDATE config SET value = ? WHERE name = ?',
        params: [jsonVal, name]
      });
      delete pendingChanges[name];
      await loadSettings();
      renderSettings();
      showToast('Saved: ' + name, 'success');
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }

  async function resetSetting(name) {
    try {
      await window.agentwfy.runSql({
        target: 'agent',
        sql: 'UPDATE config SET value = NULL WHERE name = ?',
        params: [name]
      });
      delete pendingChanges[name];
      await loadSettings();
      renderSettings();
      showToast('Reset to default: ' + name, 'success');
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }
</script>

<script id="script-render">
  const _escDiv = document.createElement('div');
  function esc(s) {
    _escDiv.textContent = s;
    return _escDiv.innerHTML.replace(/"/g, '&quot;');
  }

  function getDefaultHint(desc) {
    const m = desc.match(/\(default:\s*(.+?)\)/i) || desc.match(/default:\s*(.+?)(?:\)|$)/i);
    return m ? m[1].trim() : null;
  }

  function renderSettings() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const activeTab = document.querySelector('.tab-btn.active');
    const filter = activeTab ? activeTab.dataset.filter : 'all';

    let filtered = settings.slice();
    if (query) {
      filtered = filtered.filter(s =>
        s.name.toLowerCase().includes(query) ||
        s.description.toLowerCase().includes(query)
      );
    }
    if (filter === 'modified') {
      filtered = filtered.filter(s => s.isModified || s.name in pendingChanges);
    }

    const modCount = settings.filter(s => s.isModified).length;
    document.getElementById('modifiedCount').textContent = modCount > 0 ? modCount + ' modified' : '';

    const container = document.getElementById('settingsContainer');

    if (filtered.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' +
          '</svg>' +
          '<div>No settings found</div>' +
        '</div>';
      return;
    }

    const cats = new Map();
    for (const s of filtered) {
      if (!cats.has(s.category)) cats.set(s.category, []);
      cats.get(s.category).push(s);
    }

    let h = '';
    for (const [catKey, items] of cats) {
      const label = CATEGORY_LABELS[catKey] || catKey;
      h += '<div class="category">';
      h += '<div class="category-title">' + esc(label) + '</div>';

      for (const s of items) {
        const val = s.name in pendingChanges ? pendingChanges[s.name] : parseValue(s.value);
        const hasPending = s.name in pendingChanges;
        const defHint = getDefaultHint(s.description);

        h += '<div class="setting-row' + (hasPending ? ' has-pending' : '') + '" data-name="' + esc(s.name) + '">';
        h += '  <div class="setting-header">';
        h += '    <span class="setting-name">' + esc(s.name) + '</span>';
        if (s.isModified) h += ' <span class="badge-modified">Modified</span>';
        h += '  </div>';
        h += '  <div class="setting-desc">' + esc(s.description) + '</div>';
        h += '  <div class="setting-control">';
        h += '    <input class="setting-input' + (hasPending ? ' changed' : '') + '" '
              + 'data-name="' + esc(s.name) + '" '
              + 'value="' + esc(String(val)) + '" '
              + 'placeholder="' + esc(defHint ? defHint + ' (default)' : 'Not set') + '" '
              + 'spellcheck="false">';
        h += '    <button class="btn btn-primary btn-save" data-name="' + esc(s.name) + '">Save</button>';
        h += '    <button class="btn btn-discard" data-name="' + esc(s.name) + '">Discard</button>';
        if (s.isModified) {
          h += '    <button class="btn btn-reset btn-do-reset" data-name="' + esc(s.name) + '">'
                + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>'
                + ' Reset</button>';
        }
        h += '  </div>';
        h += '</div>';
      }
      h += '</div>';
    }

    container.innerHTML = h;
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>

<script id="script-init">
  (async () => {
    const container = document.getElementById('settingsContainer');

    container.addEventListener('input', e => {
      if (!e.target.matches('.setting-input')) return;
      const name = e.target.dataset.name;
      const original = settings.find(s => s.name === name);
      const origVal = String(parseValue(original.value));
      const row = e.target.closest('.setting-row');

      if (e.target.value !== origVal) {
        pendingChanges[name] = e.target.value;
        row.classList.add('has-pending');
        e.target.classList.add('changed');
      } else {
        delete pendingChanges[name];
        row.classList.remove('has-pending');
        e.target.classList.remove('changed');
      }
    });

    container.addEventListener('keydown', e => {
      if (!e.target.matches('.setting-input')) return;
      if (e.key === 'Enter') saveSetting(e.target.dataset.name);
      if (e.key === 'Escape') {
        const name = e.target.dataset.name;
        delete pendingChanges[name];
        const original = settings.find(s => s.name === name);
        e.target.value = String(parseValue(original.value));
        e.target.closest('.setting-row').classList.remove('has-pending');
        e.target.classList.remove('changed');
      }
    });

    container.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const name = btn.dataset.name;
      if (btn.matches('.btn-save')) saveSetting(name);
      else if (btn.matches('.btn-discard')) {
        delete pendingChanges[name];
        renderSettings();
      }
      else if (btn.matches('.btn-do-reset')) resetSetting(name);
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSettings();
      });
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderSettings, 150);
    });

    await loadSettings();
    renderSettings();
    document.getElementById('searchInput').focus();
  })();
</script>
</body>
</html>

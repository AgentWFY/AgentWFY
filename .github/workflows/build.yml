name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: node scripts/setup

      - name: Debug types directory
        run: |
          echo "=== types/ directory ==="
          ls -la types/ || echo "types/ not found"
          ls -la types/node/ | head -5 || echo "types/node/ not found"
          ls -la types/electron/ || echo "types/electron/ not found"
          echo "=== tsconfig.json ==="
          cat tsconfig.json
          echo "=== vendor/tsgo version ==="
          ./vendor/tsgo/lib/tsgo --version 2>&1 || vendor\\tsgo\\lib\\tsgo.exe --version 2>&1 || echo "tsgo version check failed"
        shell: bash

      - run: node scripts/build

      - run: node scripts/package

      - run: node scripts/make

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: out/make/**/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
